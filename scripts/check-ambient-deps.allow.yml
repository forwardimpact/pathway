# Ambient-dependency allow-list ‚Äî path globs permitted to use ambient deps.
#
# The checker (scripts/check-ambient-deps.mjs) skips these paths entirely, so
# an entry exempts the whole file from ALL ambient-dep smells, forever. Reserve
# it for the categories the spec names (default-collaborator factories, bin
# shims, libcli internals) and for domain files whose flagged construct is a
# deterministic, non-ambient false positive ‚Äî each documented inline below.

globs:
  # ‚îÄ‚îÄ Bin shims & service entrypoints: the composition root that *constructs*
  #    the runtime bag, so it legitimately touches process/fs/clock directly.
  - "libraries/*/bin/*.js"
  - "products/*/bin/*.js"
  - "services/*/bin/*.js"
  - "services/*/server.js"

  # ‚îÄ‚îÄ Default-collaborator factories & their building blocks: these ARE the
  #    seam the rest of the codebase injects, so they read the real runtime.
  - "libraries/libutil/src/runtime.js" # createDefault{Runtime,Clock,Proc,Subprocess}
  - "libraries/libutil/src/calendar.js" # the canonical deterministic date helpers (isoDate, ‚Ä¶)
  - "libraries/libutil/src/git-client.js"
  - "libraries/libutil/src/gh-client.js"

  # ‚îÄ‚îÄ libcli internals: the argv‚ÜíInvocationContext layer that produces the
  #    `runtime` bag for every dispatched CLI.
  - "libraries/libcli/src/**"

  # ‚îÄ‚îÄ libmock: the canonical fakes (createMockFs/createMockClock/‚Ä¶) deliberately
  #    mirror node:fs/Date shapes, so they reference the real ones.
  - "libraries/libmock/src/**"

  # ‚îÄ‚îÄ Synthetic-data domain files: the only flagged smell is `new Date(<arg>)`
  #    used for deterministic date *arithmetic* over explicit scenario inputs
  #    (e.g. `new Date(scenario.timerange_start + "-01")`) ‚Äî never the ambient
  #    no-arg `new Date()` / `Date.now()`. The AST checker cannot tell the two
  #    apart, so the whole-file entry tolerates the false positive. Clock reads
  #    in these libraries already route through the injected runtime.clock.
  - "libraries/libsyntheticgen/src/activity/comment.js" # new Date(snap.*/scenario.*) for comment timestamps
  - "libraries/libsyntheticgen/src/activity/webhook.js" # new Date(scenario range) for webhook windows
  - "libraries/libsyntheticgen/src/engine/activity.js" # new Date(scenario range) + new Date(Date.UTC(...)) snapshots
  - "libraries/libsyntheticgen/src/engine/activity-initiatives.js" # new Date(scenario.timerange_*) for initiative dates
  - "libraries/libsyntheticrender/src/render/html.js" # new Date(allDates[‚Ä¶]).getFullYear() over fixture dates

  # ‚îÄ‚îÄ libui: browser DOM module. Its `setTimeout` is the window timer for a
  #    copy-button animation; `runtime` is a node-side bag with no browser-DOM
  #    surface, and libui is a published zero-dependency browser library, so
  #    injecting the node clock would pull node-only code into browser bundles.
  - "libraries/libui/src/command-bar.js" # window.setTimeout for copy-feedback UI
