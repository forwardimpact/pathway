# Ambient-dependency allow-list — path globs permitted to use ambient deps.
#
# The checker (scripts/check-ambient-deps.mjs) skips these paths entirely, so
# an entry exempts the whole file from ALL ambient-dep smells, forever. Reserve
# it for the categories the spec names (default-collaborator factories, bin
# shims, libcli internals) and for domain files whose flagged construct is a
# deterministic, non-ambient false positive — each documented inline below.

globs:
  # ── Bin shims & service entrypoints: the composition root that *constructs*
  #    the runtime bag, so it legitimately touches process/fs/clock directly.
  - "libraries/*/bin/*.js"
  - "products/*/bin/*.js"
  - "services/*/bin/*.js"
  - "services/*/server.js"

  # ── Default-collaborator factories & their building blocks: these ARE the
  #    seam the rest of the codebase injects, so they read the real runtime.
  - "libraries/libutil/src/runtime.js" # createDefault{Runtime,Clock,Proc,Subprocess}
  - "libraries/libutil/src/calendar.js" # the canonical deterministic date helpers (isoDate, …)
  - "libraries/libutil/src/git-client.js"
  - "libraries/libutil/src/gh-client.js"

  # ── libcli internals: the argv→InvocationContext layer that produces the
  #    `runtime` bag for every dispatched CLI.
  - "libraries/libcli/src/**"

  # ── libmock: the canonical fakes (createMockFs/createMockClock/…) deliberately
  #    mirror node:fs/Date shapes, so they reference the real ones.
  - "libraries/libmock/src/**"

  # ── Synthetic-data domain files: the only flagged smell is `new Date(<arg>)`
  #    used for deterministic date *arithmetic* over explicit scenario inputs
  #    (e.g. `new Date(scenario.timerange_start + "-01")`) — never the ambient
  #    no-arg `new Date()` / `Date.now()`. The AST checker cannot tell the two
  #    apart, so the whole-file entry tolerates the false positive. Clock reads
  #    in these libraries already route through the injected runtime.clock.
  - "libraries/libsyntheticgen/src/activity/comment.js" # new Date(snap.*/scenario.*) for comment timestamps
  - "libraries/libsyntheticgen/src/activity/webhook.js" # new Date(scenario range) for webhook windows
  - "libraries/libsyntheticgen/src/engine/activity.js" # new Date(scenario range) + new Date(Date.UTC(...)) snapshots
  - "libraries/libsyntheticgen/src/engine/activity-initiatives.js" # new Date(scenario.timerange_*) for initiative dates
  - "libraries/libsyntheticrender/src/render/html.js" # new Date(allDates[…]).getFullYear() over fixture dates
  - "products/summit/src/git/history.js" # new Date(iso) parses git commit timestamps; subprocess routes through runtime (cwd is caller-supplied, else inherited)

  # ── libui: browser DOM module. Its `setTimeout` is the window timer for a
  #    copy-button animation; `runtime` is a node-side bag with no browser-DOM
  #    surface, and libui is a published zero-dependency browser library, so
  #    injecting the node clock would pull node-only code into browser bundles.
  - "libraries/libui/src/command-bar.js" # window.setTimeout for copy-feedback UI

  # ── Pathway browser components & pages: client-side DOM modules bundled into
  #    the static Pathway site. Their `setTimeout` (DOM-ready / animation) and
  #    `Date.now()` (unique DOM element ids) are browser-UI concerns; `runtime`
  #    is a node-side bag with no DOM surface, and injecting the node clock would
  #    pull node-only code into the browser bundle (same rationale as libui).
  - "products/pathway/src/components/builder.js"
  - "products/pathway/src/components/code-display.js"
  - "products/pathway/src/components/command-prompt.js"
  - "products/pathway/src/components/comparison-radar.js"
  - "products/pathway/src/components/progression-table.js"
  - "products/pathway/src/components/radar-chart.js"
  - "products/pathway/src/components/top-bar.js"
  - "products/pathway/src/pages/progress.js"
