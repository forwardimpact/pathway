get_ontology:
  purpose: |
    Returns the complete schema vocabulary showing all entity types and 
    relationship predicates that exist in the knowledge graph.
  applicability: |
    Required before constructing structured queries with get_subjects or
    query_by_pattern to learn the correct vocabulary.
  instructions: |
    No input parameters. Returns a SHACL ontology with types (schema:Drug,
    schema:Person, schema:SoftwareApplication, etc.) and predicates
    (schema:member, schema:clinicalPharmacology, schema:softwareRequirements, etc.).
  evaluation: |
    Complete schema showing available types and predicates.
  parameters: {}

get_subjects:
  purpose: |
    Lists entity URIs in the graph, optionally filtered by type.
  applicability: |
    Use after get_ontology to find URIs for entities of a specific type.
    Provides the subject URIs needed for query_by_pattern.
  instructions: |
    Input: Optional 'type' field (e.g., "schema:Organization", "schema:Drug").
    Output: Tab-separated list of entity URIs and their types.
  evaluation: |
    List of all entities matching the type filter.
  parameters:
    type:
      Entity type URI to filter by (e.g., "schema:Organization", "schema:Drug").

query_by_pattern:
  purpose: |
    Retrieves structured data by traversing graph relationships using RDF
    triple patterns (subject-predicate-object).
  applicability: |
    Use after get_ontology and get_subjects to query relationships between
    specific entities. Retrieves factual structured data.
  instructions: |
    Input: Optional 'subject', 'predicate', 'object' fields. Use '?' for wildcards.
    Example: (subject=entity-uri, predicate="schema:member", object=?)
    Output: Array of matching content.
  evaluation: |
    Structured facts matching the triple pattern.
  parameters:
    subject: Subject URI of the triple pattern (use "?" as wildcard).
    predicate: Predicate URI defining the relationship (use "?" as wildcard).
    object: Object URI or literal value (use "?" as wildcard).

search_content:
  purpose: |
    Find detailed content using semantic similarity search.
  applicability: |
    Use for "what is X", "how does Y work", or when graph queries insufficient.
  instructions: |
    Input: Text query in 'input' field.
    Optional: 'limit' and 'threshold' for filtering.
  evaluation: |
    Array of detailed content strings matching your query.
  parameters:
    input: Text queries to search for using semantic similarity.

sha256_hash:
  purpose: |
    Generate a deterministic SHA-256 cryptographic hash of input text for
    security, verification, or identification purposes.
  applicability: |
    SEQUENCING: Independent utility - no sequencing requirements.
    Use ONLY when user explicitly requests SHA-256 hashing functionality.
    DO NOT use for search, content analysis, or similarity detection.
    Reserved for security, verification, and identification use cases.
  instructions: |
    Input: Text string in 'input' field to be hashed.
    Output: Deterministic 64-character hexadecimal SHA-256 hash string.
    Hash is cryptographically secure and suitable for verification purposes.
  evaluation: |
    Returns exactly 64-character hexadecimal string representing the SHA-256
    hash of the input text.
  parameters:
    input: Text string to be hashed using SHA-256 algorithm.

md5_hash:
  purpose: |
    Generate an MD5 hash of input text for legacy compatibility or quick
    checksums (note: MD5 is not cryptographically secure).
  applicability: |
    SEQUENCING: Independent utility - no sequencing requirements.
    Use ONLY when user explicitly requests MD5 hashing functionality.
    DO NOT use for search, content analysis, or security purposes.
    Reserved for legacy compatibility and non-security checksums.
  instructions: |
    Input: Text string in 'input' field to be hashed.
    Output: 32-character hexadecimal MD5 hash string.
    Note: MD5 is not cryptographically secure - use SHA-256 for security.
  evaluation: |
    Returns exactly 32-character hexadecimal string representing the MD5
    hash of the input text.
  parameters:
    input: Text string to be hashed using MD5 algorithm.

list_sub_agents:
  purpose: |
    List available sub-agents that can be invoked for delegation.
  applicability: |
    Use to discover which agents are available for sub-agent invocation.
    Only agents with infer=true will be returned.
  instructions: |
    No input parameters. Returns list of agent IDs available for delegation.
  evaluation: |
    List of agent IDs that can be passed to run_sub_agent.
  parameters: {}

run_sub_agent:
  purpose: |
    Run a sub-agent with a specific task in an isolated child conversation.
  applicability: |
    Use when delegating a specific task to another agent. The sub-agent
    executes in isolation and returns results without affecting the
    current conversation context.
  instructions: |
    Input: 'agent_id' (from list_sub_agents) and 'prompt' (task description).
    Output: Sub-agent response with generated messages.
  evaluation: |
    Complete response from the sub-agent for the delegated task.
  parameters:
    agent_id: Identifier of the sub-agent to invoke (from list_sub_agents).
    prompt: Task description or instructions for the sub-agent to execute.

list_handoffs:
  purpose: |
    List valid handoff labels available from the current agent.
  applicability: |
    Use to discover which handoffs are configured for the current agent
    before executing a handoff.
  instructions: |
    No input parameters (uses current conversation context).
    Returns list of handoff labels.
  evaluation: |
    List of labels that can be passed to run_handoff.
  parameters: {}

run_handoff:
  purpose: |
    Hand off conversation control to another agent.
  applicability: |
    Use when the current task requires a different agent's expertise.
    The handoff transfers the full conversation context to the target agent.
  instructions: |
    Input: 'label' (from list_handoffs).
    Output: Confirmation of handoff with new agent ID.
  evaluation: |
    Conversation control transferred to the target agent.
  parameters:
    label: Handoff label identifying the target agent (from list_handoffs).

pathway_list_jobs:
  purpose: |
    List jobs (discipline x level x track combinations) defined in the
    pathway framework, returned as Turtle RDF using the fit: vocabulary.
  applicability: |
    Use to discover which fit:Job entities exist before calling
    pathway_describe_job for full skill matrix detail. Optionally filter by
    discipline.
  instructions: |
    Input: optional 'discipline' field.
    Output: Turtle RDF with one fit:Job per valid combination (discipline,
    level, optional track) plus its rdfs:label.
  evaluation: |
    Turtle RDF describing every job in the framework using the fit:
    vocabulary. Job IRIs can be passed back into pathway_describe_job.
  parameters:
    discipline: Optional discipline id (e.g. "fde") to filter jobs.

pathway_describe_job:
  purpose: |
    Describe a single job at a specific (discipline, level, track) including
    its derived skill matrix, behaviour profile, and responsibilities.
  applicability: |
    Use after pathway_list_jobs (or query_by_pattern on fit:Job) to retrieve
    full detail about one role.
  instructions: |
    Input: required 'discipline' and 'level', optional 'track'.
    Output: Turtle RDF describing the fit:Job with fit:skillMatrix entries,
    fit:behaviourProfile entries, and any derived responsibilities.
  evaluation: |
    Turtle RDF describing the job using the fit: vocabulary. Skill and
    behaviour IRIs can be passed to query_by_pattern or get_subjects to
    retrieve base definitions from the graph.
  parameters:
    discipline: Discipline id (e.g. "fde", "platform").
    level: Level id (e.g. "l3", "l4").
    track: Optional track id (e.g. "forward_deployed").

pathway_list_agent_profiles:
  purpose: |
    List agent profile (discipline, track) combinations defined in the
    pathway framework, returned as Turtle RDF.
    Pathway agent profiles are static role descriptions in framework data —
    they are NOT runnable LLM sub-agents. Use list_sub_agents for delegation.
  applicability: |
    Use to discover which fit:AgentProfile entities exist before calling
    pathway_describe_agent_profile.
    Pathway agent profiles are static role descriptions in framework data —
    they are NOT runnable LLM sub-agents. Use list_sub_agents for delegation.
  instructions: |
    Input: optional 'discipline' field.
    Output: Turtle RDF with one fit:AgentProfile per (discipline, track)
    combination defined in agent data.
  evaluation: |
    Turtle RDF listing static agent profile definitions (not runnable agents).
  parameters:
    discipline: Optional discipline id to filter agent profiles.

pathway_describe_agent_profile:
  purpose: |
    Describe one or more stage-specific agent profiles for a (discipline,
    track) pair, returned as Turtle RDF.
    Pathway agent profiles are static role descriptions in framework data —
    they are NOT runnable LLM sub-agents. Use list_sub_agents for delegation.
  applicability: |
    Use to retrieve full agent profile content (skills, behaviours,
    frontmatter) for a specific role and optionally a single stage.
    Pathway agent profiles are static role descriptions in framework data —
    they are NOT runnable LLM sub-agents. Use list_sub_agents for delegation.
  instructions: |
    Input: required 'discipline' and 'track', optional 'stage'. If 'stage'
    is omitted, the service returns one fit:AgentProfile per stage.
    Output: Turtle RDF describing each fit:AgentProfile with fit:agentSkill,
    fit:agentBehaviour, fit:stage and a JSON-literal fit:frontmatter.
  evaluation: |
    Turtle RDF describing static agent profile definitions for the role
    (not runnable agents).
  parameters:
    discipline: Discipline id (e.g. "fde").
    track: Track id (e.g. "forward_deployed").
    stage: Optional stage id (e.g. "intern", "established").

pathway_describe_progression:
  purpose: |
    Compute the progression delta between two levels (and optionally tracks)
    of the same discipline, returned as Turtle RDF.
  applicability: |
    Use to answer "what changes between L2 and L3 for an FDE" style
    questions. Returns skill and behaviour deltas as RDF.
  instructions: |
    Input: required 'discipline', 'from_level', 'to_level', optional
    'track'. Output: Turtle RDF describing a fit:Progression with
    fit:skillChange and fit:behaviourChange entries (each with changeKind:
    gained/lost/increased/decreased/unchanged).
  evaluation: |
    Turtle RDF describing the progression delta. Skill and behaviour IRIs
    can be chained into query_by_pattern.
  parameters:
    discipline: Discipline id.
    from_level: Starting level id.
    to_level: Target level id.
    track: Optional track id.

pathway_list_job_software:
  purpose: |
    List the software toolkit derived for a specific job, returned as Turtle
    RDF.
    This lists software technologies used by the job (Python, Figma, etc.) —
    NOT the LLM tools available to you.
  applicability: |
    Use to discover what software a role uses day-to-day.
    This lists software technologies used by the job (Python, Figma, etc.) —
    NOT the LLM tools available to you.
  instructions: |
    Input: required 'discipline' and 'level', optional 'track'.
    Output: Turtle RDF describing a fit:Job with fit:software predicates
    pointing to fit:Tool IRIs and rdfs:label values.
  evaluation: |
    Turtle RDF describing software (not LLM tools) used by the job.
  parameters:
    discipline: Discipline id.
    level: Level id.
    track: Optional track id.
