# ==========================================
# Volumes
# Note: This file requires Docker BuildKit. Set DOCKER_BUILDKIT=1 or COMPOSE_DOCKER_CLI_BUILD=1
# ==========================================

volumes:
  minio_data:
    driver: local
  db_data:
    driver: local
  supabase_storage_data:
    driver: local
  supabase_db_data:
    driver: local
  tei_data:
    driver: local

secrets:
  github_token:
    environment: GITHUB_TOKEN

# ==========================================
# Networks
# ==========================================

networks:
  internal:
    driver: bridge

# ==========================================
# Services
# ==========================================

services:
  # ==========================================
  # Infrastructure Services
  # ==========================================

  gateway:
    build:
      context: ./infrastructure/docker/gateway
    image: fi/gateway:latest
    container_name: gateway
    ports:
      - "3128:3128"
    networks:
      internal:
        aliases:
          - gateway.local

  db:
    build:
      context: ./infrastructure/docker/db
    image: fi/db:latest
    container_name: db
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      internal:
        aliases:
          - db.local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # Core Services
  # ==========================================

  vector:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_PATH: services/vector
      secrets:
        - github_token
    image: fi/vector:latest
    container_name: vector
    env_file: .env
    networks:
      internal:
        aliases:
          - vector.local

  graph:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_PATH: services/graph
      secrets:
        - github_token
    image: fi/graph:latest
    container_name: graph
    env_file: .env
    networks:
      internal:
        aliases:
          - graph.local

  trace:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET_PATH: services/trace
      secrets:
        - github_token
    image: fi/trace:latest
    container_name: trace
    env_file: .env
    networks:
      internal:
        aliases:
          - trace.local

  # ==========================================
  # Embedding Service (TEI)
  # ==========================================

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    container_name: tei
    command: --model-id BAAI/bge-small-en-v1.5 --port 8080 --json-output
    volumes:
      - tei_data:/data
    environment:
      - HF_HOME=/data
    networks:
      internal:
        aliases:
          - tei.local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # Storage Services
  # ==========================================

  storage-minio:
    profiles:
      - minio
    image: minio/minio:latest
    container_name: storage-minio
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      internal:
        aliases:
          - storage-minio.local
    command: server /data --console-address ":9001"

  storage-supabase:
    profiles:
      - supabase
    image: supabase/storage-api:v1.11.13
    container_name: storage-supabase
    env_file:
      - .env
      - .env.storage.supabase
    environment:
      SERVICE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://postgres:${DATABASE_PASSWORD}@db.local:5432/postgres?search_path=storage
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: false
      IS_MULTITENANT: false
      S3_PROTOCOL_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      S3_PROTOCOL_ACCESS_KEY_SECRET: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "9000:5000"
    volumes:
      - supabase_storage_data:/var/lib/storage
    networks:
      internal:
        aliases:
          - storage-supabase.local
    depends_on:
      db:
        condition: service_healthy

  # ==========================================
  # Map Supabase Services
  # ==========================================

  supabase-db:
    profiles:
      - map-supabase
    image: supabase/postgres:15.6.1.143
    container_name: supabase-db
    env_file:
      - .env
      - .env.storage.supabase
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
      - ./products/map/supabase/migrations:/docker-entrypoint-initdb.d
    networks:
      internal:
        aliases:
          - supabase-db.local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  supabase-kong:
    profiles:
      - map-supabase
    image: kong:2.8.1
    container_name: supabase-kong
    env_file:
      - .env
      - .env.storage.supabase
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      SUPABASE_ANON_KEY: ${MAP_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_KEY: ${MAP_SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./products/map/supabase/kong.yml:/var/lib/kong/kong.yml:ro
    ports:
      - "54321:8000"
    networks:
      internal:
        aliases:
          - supabase-kong.local
    depends_on:
      supabase-db:
        condition: service_healthy

  supabase-map-storage:
    profiles:
      - map-supabase
    image: supabase/storage-api:v1.11.13
    container_name: supabase-map-storage
    env_file:
      - .env
      - .env.storage.supabase
    environment:
      DATABASE_URL: postgres://postgres:${DATABASE_PASSWORD}@supabase-db.local:5432/postgres
      PGRST_JWT_SECRET: ${JWT_SECRET}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: false
      IS_MULTITENANT: false
    volumes:
      - supabase_storage_data:/var/lib/storage
    networks:
      internal:
    depends_on:
      supabase-db:
        condition: service_healthy
