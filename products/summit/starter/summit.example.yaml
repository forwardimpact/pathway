        discipline: software_engineering
        level: J060
        track: platform
    - name: Bob
      email: bob@example.com
      job:
        discipline: software_engineering
        level: J040

  delivery:
    - name: Carol
      email: carol@example.com
      job:
        discipline: software_engineering
        level: J060
    - name: Dan
      email: dan@example.com
      job:
        discipline: software_engineering
        level: J040
        track: forward_deployed

projects:
