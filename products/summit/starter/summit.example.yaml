# Example Summit roster — copy to your data directory as summit.yaml.
# All disciplines, levels, and tracks referenced here must be defined in
# your Map framework data. This example uses the starter framework:
#   discipline: software_engineering
#   levels: J040 (Level I), J060 (Level II)
#   tracks: platform, forward_deployed

teams:
  platform:
    - name: Alice
      email: alice@example.com
