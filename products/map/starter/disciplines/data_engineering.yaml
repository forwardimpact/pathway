# yaml-language-server: $schema=https://www.forwardimpact.team/schema/json/discipline.schema.json

specialization: Data Engineering
roleTitle: Data Engineer
isProfessional: true

# null = allow trackless (generalist)
validTracks:
  - null
  - platform

description:
  Builds and operates the data pipelines, models, and platforms that move data
  reliably from source systems to analytics, ML, and product surfaces.

# Derivation inputs — substrate-aligned skill set
coreSkills:
  - data_integration
  - data_modeling
  - performance_optimization
supportingSkills:
  - architecture_design
  - cloud_platforms
broadSkills:
  - stakeholder_management
  - regulatory_compliance
behaviourModifiers:
  systems_thinking: 1

# Human-specific content
human:
  professionalRoleSummary:
    As a {roleTitle}, you build and operate the data pipelines and models
    that make trustworthy data available to the rest of the business.
  managementRoleSummary:
    As a {specialization} manager, you lead teams that build and operate the
    data pipelines and models the business depends on.

# Agent-specific content
agent:
  identity: |
    You are a {roleTitle} agent focused on moving data reliably from source
    systems to analytics, ML, and application consumers.
  priority: |
    Build and operate pipelines that produce correct, well-modelled data on
    schedule, with the observability needed to trust the output.
  constraints:
    - Treat schema and contract changes as breaking by default
    - Verify data quality before declaring a pipeline run successful
    - Document model and pipeline assumptions alongside the code
