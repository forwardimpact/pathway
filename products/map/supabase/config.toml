[api]
enabled = true
port = 54321
schemas = ["public", "activity"]
extra_search_path = ["public", "activity"]

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
jwt_secret = "env(SUPABASE_JWT_SECRET)"
jwt_expiry = 3600
enable_signup = false
# `fit-landmark login` (PKCE magic-link) starts a listener on an ephemeral
# 127.0.0.1 port and asks Supabase to redirect the email link back to it.
# The wildcard admits any port without per-engineer config churn.
additional_redirect_urls = ["http://127.0.0.1/*"]

[auth.email]
enable_signup = false
double_confirm_changes = false
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[analytics]
enabled = false
