syntax = "proto3";

package pathway;

import "common.proto";
import "tool.proto";

service Pathway {
  rpc ListJobs(ListJobsRequest) returns (tool.ToolCallResult);
  rpc DescribeJob(DescribeJobRequest) returns (tool.ToolCallResult);
  rpc ListAgentProfiles(ListAgentProfilesRequest) returns (tool.ToolCallResult);
  rpc DescribeAgentProfile(DescribeAgentProfileRequest) returns (tool.ToolCallResult);
  rpc DescribeProgression(DescribeProgressionRequest) returns (tool.ToolCallResult);
  rpc ListJobSoftware(ListJobSoftwareRequest) returns (tool.ToolCallResult);
  rpc GetMarkersForProfile(GetMarkersForProfileRequest) returns (tool.ToolCallResult);
}

message ListJobsRequest {
  // Discipline id to filter by (e.g. 'software_engineering')
  optional string discipline = 1;
}

message DescribeJobRequest {
  // Discipline id (e.g. 'software_engineering')
  string discipline = 1;
  // Level id (e.g. 'J060')
  string level = 2;
  // Track id for specialization modifier (e.g. 'forward_deployed')
  optional string track = 3;
}

message ListAgentProfilesRequest {
  // Discipline id to filter by (e.g. 'software_engineering')
  optional string discipline = 1;
}

message DescribeAgentProfileRequest {
  // Discipline id (e.g. 'software_engineering')
  string discipline = 1;
  // Track id (e.g. 'platform')
  string track = 2;
  reserved 3;
}

message DescribeProgressionRequest {
  // Discipline id (e.g. 'software_engineering')
  string discipline = 1;
  // Starting level id (e.g. 'J040')
  string from_level = 2;
  // Target level id (e.g. 'J060')
  string to_level = 3;
  // Track id for specialization modifier (e.g. 'forward_deployed')
  optional string track = 4;
}

message ListJobSoftwareRequest {
  // Discipline id (e.g. 'software_engineering')
  string discipline = 1;
  // Level id (e.g. 'J060')
  string level = 2;
  // Track id for specialization modifier (e.g. 'forward_deployed')
  optional string track = 3;
}

// Spec 800: Markers an engineer at a (discipline, level, track) profile is
// expected to demonstrate. Used by Guide's evaluation skill to ground
// evidence rows in the engineering standard.
message GetMarkersForProfileRequest {
  // Discipline id (e.g. 'software_engineering')
  string discipline = 1;
  // Level id (e.g. 'J060')
  string level = 2;
  // Track id for specialization modifier (e.g. 'forward_deployed')
  optional string track = 3;
}
