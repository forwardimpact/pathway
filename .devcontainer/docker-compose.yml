services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:22-bookworm
    volumes:
      - ..:/workspaces/monorepo:cached
    command: sleep infinity
    depends_on:
      tei:
        condition: service_healthy

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    command: >-
      --model-id BAAI/bge-small-en-v1.5 --port 8090 --json-output
      --auto-truncate --max-concurrent-requests 32 --tokenization-workers 4
    volumes:
      - tei_data:/data
    environment:
      - HF_HOME=/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  tei_data:
