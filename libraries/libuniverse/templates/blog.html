{{#posts}}
  <article itemscope itemtype="https://schema.org/BlogPosting" itemid="{{domain}}/blog/{{index}}">
    <h2 itemprop="headline">Engineering Blog Post {{index}}</h2>
    <div itemprop="articleBody"><p>{{body}}</p></div>
    <time itemprop="datePublished">{{date}}</time>
  </article>
{{/posts}}
