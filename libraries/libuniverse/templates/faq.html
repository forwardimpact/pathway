{{#faqs}}
  <div itemscope itemtype="https://schema.org/Question" itemid="{{domain}}/faq/{{index}}">
    <span itemprop="name">FAQ Question {{index}}</span>
    <div itemscope itemtype="https://schema.org/Answer" itemprop="acceptedAnswer">
      <span itemprop="text">{{answer}}</span>
    </div>
  </div>
{{/faqs}}
