{{#events}}
  <div itemscope itemtype="https://schema.org/Event" itemid="{{domain}}/event/{{index}}">
    <span itemprop="name">{{title}}</span>
    <span itemprop="organizer">{{orgName}}</span>
    <time itemprop="startDate">{{date}}</time>
    <span itemprop="location">{{location}}</span>
  </div>
{{/events}}
