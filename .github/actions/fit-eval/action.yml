name: Fit Eval
description: Run agent tasks via fit-eval CLI using the Claude Agent SDK

inputs:
  task-file:
    description: Path to task file (mutually exclusive with task-text)
    required: false
  task-text:
    description: Inline task text (mutually exclusive with task-file)
    required: false
  mode:
    description: Execution mode — "run" (single agent) or "supervise"
    required: false
    default: "run"
  cwd:
    description: Agent working directory (for "run" mode)
    required: false
    default: "."
  supervisor-cwd:
    description: Supervisor working directory (for "supervise" mode)
    required: false
    default: "."
  agent-cwd:
    description: Agent working directory (for "supervise" mode)
    required: false
  model:
    description: Claude model to use
    required: false
    default: "opus"
  max-turns:
    description: Maximum turns
    required: false
    default: "200"
  allowed-tools:
    description: Comma-separated list of allowed tools
    required: false
    default: "Bash,Read,Glob,Grep,Write,Edit"
  supervisor-profile:
    description:
      Supervisor agent profile name (passed as --agent to Claude CLI, supervise
      mode only)
    required: false
  agent-profile:
    description: Agent profile name (passed as --agent to Claude CLI)
    required: false
  trace:
    description: Enable trace capture and artifact upload
    required: false
    default: "true"
  app-slug:
    description: GitHub App slug for git identity
    required: false
    default: forward-impact-ci
  app-id:
    description: GitHub App ID for git identity email
    required: true

runs:
  using: composite
  steps:
    - name: Configure Git identity
      shell: bash
      env:
        APP_SLUG: ${{ inputs.app-slug }}
        APP_ID: ${{ inputs.app-id }}
      run: |
        git config user.name "${APP_SLUG}[bot]"
        git config user.email "${APP_ID}+${APP_SLUG}[bot]@users.noreply.github.com"

    - name: Setup trace directory
      if: inputs.trace == 'true'
      id: setup
      shell: bash
      run: |
        TRACE_DIR=$(mktemp -d)
        echo "trace-dir=$TRACE_DIR" >> "$GITHUB_OUTPUT"

    - name: Run fit-eval
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
        TASK_FILE: ${{ inputs.task-file }}
        TASK_TEXT: ${{ inputs.task-text }}
        CWD: ${{ inputs.cwd }}
        SUPERVISOR_CWD: ${{ inputs.supervisor-cwd }}
        AGENT_CWD: ${{ inputs.agent-cwd }}
        MODEL: ${{ inputs.model }}
        MAX_TURNS: ${{ inputs.max-turns }}
        TOOLS: ${{ inputs.allowed-tools }}
        SUPERVISOR_PROFILE: ${{ inputs.supervisor-profile }}
        AGENT_PROFILE: ${{ inputs.agent-profile }}
        TRACE_ENABLED: ${{ inputs.trace }}
        TRACE_DIR: ${{ steps.setup.outputs.trace-dir }}
      run: |
        # Build args array to avoid quoting issues with spaces in paths
        args=()

        # Resolve task source — exactly one of task-file or task-text is required
        if [ -n "$TASK_FILE" ] && [ -n "$TASK_TEXT" ]; then
          echo "::error::task-file and task-text are mutually exclusive"
          exit 1
        elif [ -n "$TASK_FILE" ]; then
          args+=("--task-file=$TASK_FILE")
        elif [ -n "$TASK_TEXT" ]; then
          args+=("--task-text=$TASK_TEXT")
        else
          echo "::error::Either task-file or task-text is required"
          exit 1
        fi

        if [ "$TRACE_ENABLED" = "true" ] && [ -n "$TRACE_DIR" ]; then
          args+=("--output=$TRACE_DIR/trace.ndjson")
        fi

        if [ "$MODE" = "supervise" ]; then
          agent_cwd="${AGENT_CWD:-$(mktemp -d)}"

          if [ -n "$SUPERVISOR_PROFILE" ]; then
            args+=("--supervisor-profile=$SUPERVISOR_PROFILE")
          fi
          if [ -n "$AGENT_PROFILE" ]; then
            args+=("--agent-profile=$AGENT_PROFILE")
          fi

          bunx fit-eval supervise \
            --supervisor-cwd="$SUPERVISOR_CWD" \
            --agent-cwd="$agent_cwd" \
            --model="$MODEL" \
            --max-turns="$MAX_TURNS" \
            --allowed-tools="$TOOLS" \
            "${args[@]}"
        else
          if [ -n "$AGENT_PROFILE" ]; then
            args+=("--agent-profile=$AGENT_PROFILE")
          fi

          bunx fit-eval run \
            --cwd="$CWD" \
            --model="$MODEL" \
            --max-turns="$MAX_TURNS" \
            --allowed-tools="$TOOLS" \
            "${args[@]}"
        fi

    - name: Split supervised trace
      if:
        always() && inputs.trace == 'true' && inputs.mode == 'supervise' &&
        steps.setup.outputs.trace-dir != ''
      shell: bash
      env:
        TRACE_DIR: ${{ steps.setup.outputs.trace-dir }}
      run: |
        # Extract agent events (unwrapped) so the trace matches a regular run
        jq -c 'select(.source == "agent") | .event' "$TRACE_DIR/trace.ndjson" \
          > "$TRACE_DIR/agent-trace.ndjson"
        # Extract supervisor events (unwrapped)
        jq -c 'select(.source == "supervisor") | .event' "$TRACE_DIR/trace.ndjson" \
          > "$TRACE_DIR/supervisor-trace.ndjson"

    - name: Upload agent trace
      if:
        always() && inputs.trace == 'true' && steps.setup.outputs.trace-dir !=
        ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: agent-trace
        path: |
          ${{ inputs.mode == 'supervise' && format('{0}/agent-trace.ndjson', steps.setup.outputs.trace-dir) || format('{0}/trace.ndjson', steps.setup.outputs.trace-dir) }}

    - name: Upload supervisor trace
      if:
        always() && inputs.trace == 'true' && inputs.mode == 'supervise' &&
        steps.setup.outputs.trace-dir != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: supervisor-trace
        path: ${{ steps.setup.outputs.trace-dir }}/supervisor-trace.ndjson

    - name: Upload combined trace
      if:
        always() && inputs.trace == 'true' && inputs.mode == 'supervise' &&
        steps.setup.outputs.trace-dir != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: combined-trace
        path: ${{ steps.setup.outputs.trace-dir }}/trace.ndjson
