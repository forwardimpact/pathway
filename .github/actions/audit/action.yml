name: Security Audit
description: Run npm audit and gitleaks secret scanning

inputs:
  vulnerability-scanning:
    description: Run dependency vulnerability scanning
    required: false
    default: "true"
  secret-scanning:
    description: Run secret scanning on the repository
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Vulnerability scanning
      if: inputs.vulnerability-scanning == 'true'
      shell: bash
      run: npm audit --audit-level=high --omit=dev --workspaces

    - name: Install gitleaks
      if: inputs.secret-scanning == 'true'
      shell: bash
      run: |
        GITLEAKS_VERSION="8.24.3"
        GITLEAKS_SHA256="9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c"
        curl -sSfL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
        echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
        tar xzf gitleaks.tar.gz
        rm gitleaks.tar.gz
        sudo mv gitleaks /usr/local/bin/

    - name: Secret scanning
      if: inputs.secret-scanning == 'true'
      shell: bash
      run: gitleaks detect --source . --verbose
