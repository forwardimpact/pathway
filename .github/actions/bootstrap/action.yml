name: Bootstrap
description: >
  Thin wrapper around forwardimpact/fit-bootstrap@v1, which is the
  single source of truth for the FIT CI environment (Bun + cached deps
  + cached workspace + wiki sync + ./scripts/bootstrap.sh + post-run
  wiki push). All workflows in this repo and the kata-agent sibling
  action ultimately bottom out in the same sibling release.

inputs:
  token:
    description: GitHub token with write access to the wiki. When provided, the wiki is checked out into ./wiki and pushed back during post-run cleanup.
    required: false
    default: ""
  app-slug:
    description: GitHub App slug for git identity (e.g. kata-agent-team). When provided with app-id, sets git identity to the app bot account instead of the generic github-actions bot.
    required: false
    default: ""
  app-id:
    description: GitHub App ID for git identity email. Used together with app-slug.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: forwardimpact/fit-bootstrap@v1
      with:
        token: ${{ inputs.token }}
        app-slug: ${{ inputs.app-slug }}
        app-id: ${{ inputs.app-id }}
