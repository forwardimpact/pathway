name: Bootstrap
description: Set up Bun, install just, and run just install

inputs:
  token:
    description: GitHub token with write access to the wiki. When provided, the wiki is checked out into ./wiki and pushed back during post-run cleanup.
    required: false
    default: ""
  app-slug:
    description: GitHub App slug for git identity (e.g. kata-agent-team). When provided with app-id, sets git identity to the app bot account instead of the generic github-actions bot.
    required: false
    default: ""
  app-id:
    description: GitHub App ID for git identity email. Used together with app-slug.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: "1.3.11"
        no-cache: false

    - name: Configure git identity
      shell: bash
      env:
        APP_SLUG: ${{ inputs.app-slug }}
        APP_ID: ${{ inputs.app-id }}
      run: |
        if [ -n "$APP_SLUG" ] && [ -n "$APP_ID" ]; then
          git config --global user.name "${APP_SLUG}[bot]"
          git config --global user.email "${APP_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
        else
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        fi

    - name: Checkout wiki
      if: inputs.token != ''
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: ${{ github.repository }}.wiki
        path: wiki
        token: ${{ inputs.token }}

    - name: Restore deps cache
      id: deps-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.local/bin
          ~/.local/lib/apm
          ~/.local/lib/just
          ~/.local/lib/gh
        key: deps-${{ runner.os }}-${{ hashFiles('scripts/install-deps.sh') }}

    - name: Install CLI dependencies
      if: steps.deps-cache.outputs.cache-hit != 'true'
      shell: bash
      run: bash scripts/install-deps.sh

    - name: Add deps to PATH
      shell: bash
      run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Restore workspace cache
      id: workspace-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          node_modules
          generated
          libraries/*/src/generated
        key: workspace-${{ runner.os }}-${{ hashFiles('bun.lock', '**/*.proto', 'libraries/libcodegen/src/**', 'libraries/libcodegen/templates/**', 'libraries/libcodegen/bin/**') }}

    - name: Bootstrap
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        BOOTSTRAP_WORKSPACE_CACHE_HIT: ${{ steps.workspace-cache.outputs.cache-hit }}
      run: ./scripts/bootstrap.sh

    - name: Push wiki changes
      if: inputs.token != ''
      uses: ./.github/actions/post-run
      with:
        command: just wiki-push
