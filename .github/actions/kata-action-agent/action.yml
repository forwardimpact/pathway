name: Kata Agent
description: >
  Run a Kata agent workflow — generates an installation token, checks out the repository, bootstraps the environment, and executes the agent via fit-eval.

inputs:
  # --- Authentication ---
  app-id:
    description: GitHub App ID for token generation and git identity
    required: true
  app-private-key:
    description: GitHub App private key for token generation
    required: true
  anthropic-api-key:
    description: Anthropic API key for the Claude Agent SDK
    required: true
  app-slug:
    description: GitHub App slug for git identity
    required: false
    default: "kata-agent-team"
  # --- Agent configuration ---
  mode:
    description: Execution mode (run, supervise, facilitate)
    required: false
    default: "run"
  task-text:
    description: Inline task text (mutually exclusive with task-file)
    required: false
  task-file:
    description: Path to task file (mutually exclusive with task-text)
    required: false
  agent-profile:
    description: Agent profile name (run and supervise modes)
    required: false
  facilitator-profile:
    description: Facilitator profile name (facilitate mode)
    required: false
  agent-profiles:
    description: Comma-separated agent profile names (facilitate mode)
    required: false
  supervisor-profile:
    description: Supervisor agent profile name (supervise mode)
    required: false
  model:
    description: Claude model to use
    required: false
    default: "claude-opus-4-7[1m]"
  max-turns:
    description: Maximum turns (0 = unlimited)
    required: false
    default: "200"
  allowed-tools:
    description: Comma-separated list of allowed tools for the agent
    required: false
    default: "Bash,Read,Glob,Grep,Write,Edit,Agent,TodoWrite"
  supervisor-allowed-tools:
    description: Comma-separated list of allowed tools for the supervisor (supervise mode only)
    required: false
  task-amend:
    description: Additional text appended to the task prompt for steering
    required: false
  # --- Optional overrides ---
  cwd:
    description: Agent working directory (run mode)
    required: false
    default: "."
  supervisor-cwd:
    description: Supervisor working directory (supervise mode)
    required: false
    default: "."
  agent-cwd:
    description: Agent working directory (supervise and facilitate modes)
    required: false
    default: "."
  timeout-minutes:
    description: Maximum minutes before cancellation
    required: false
    default: "45"
  trace:
    description: Enable trace capture and artifact upload
    required: false
    default: "true"
  wiki:
    description: Enable wiki checkout and sync
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Generate installation token
      id: ci-app
      uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
        token: ${{ steps.ci-app.outputs.token }}

    - uses: ./.github/actions/bootstrap
      with:
        token: ${{ inputs.wiki == 'true' && steps.ci-app.outputs.token || '' }}
        app-slug: ${{ inputs.app-slug }}
        app-id: ${{ inputs.app-id }}

    - name: Assess and Act
      uses: ./.github/actions/kata-action-eval
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GH_TOKEN: ${{ steps.ci-app.outputs.token }}
        CLAUDE_CODE_USE_BEDROCK: "0"
      with:
        mode: ${{ inputs.mode }}
        task-text: ${{ inputs.task-text }}
        task-file: ${{ inputs.task-file }}
        agent-profile: ${{ inputs.agent-profile }}
        facilitator-profile: ${{ inputs.facilitator-profile }}
        agent-profiles: ${{ inputs.agent-profiles }}
        supervisor-profile: ${{ inputs.supervisor-profile }}
        model: ${{ inputs.model }}
        max-turns: ${{ inputs.max-turns }}
        allowed-tools: ${{ inputs.allowed-tools }}
        supervisor-allowed-tools: ${{ inputs.supervisor-allowed-tools }}
        task-amend: ${{ inputs.task-amend }}
        cwd: ${{ inputs.cwd }}
        supervisor-cwd: ${{ inputs.supervisor-cwd }}
        agent-cwd: ${{ inputs.agent-cwd }}
        timeout-minutes: ${{ inputs.timeout-minutes }}
        trace: ${{ inputs.trace }}
