name: Coaligned Check
description: |
  Run a coaligned subcommand (instructions or jtbd) to enforce the layered
  instruction architecture defined in COALIGNED.md.

  Assumes the workspace has already been bootstrapped (Bun installed,
  dependencies linked) so `bunx coaligned` resolves. When this action is
  published as a third-party action, a setup step will be added so external
  consumers do not need to install Bun separately.

inputs:
  command:
    description: 'Subcommand to run: "instructions" or "jtbd".'
    required: true
  fix:
    description: 'For "jtbd": regenerate stale catalog and jobs blocks in place. Ignored by other subcommands.'
    required: false
    default: "false"
  working-directory:
    description: Directory in which to run the command. Defaults to the repository root.
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        COMMAND: ${{ inputs.command }}
        FIX: ${{ inputs.fix }}
      run: |
        case "$COMMAND" in
          instructions|jtbd) ;;
          *)
            echo "::error::coaligned-check: unknown command \"$COMMAND\". Expected one of: instructions, jtbd."
            exit 2
            ;;
        esac
        case "$FIX" in
          true|false) ;;
          *)
            echo "::error::coaligned-check: fix must be \"true\" or \"false\", got \"$FIX\"."
            exit 2
            ;;
        esac
        if [ "$FIX" = "true" ] && [ "$COMMAND" != "jtbd" ]; then
          echo "::error::coaligned-check: fix=true is only supported for command=jtbd."
          exit 2
        fi

    - name: Run coaligned ${{ inputs.command }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        COMMAND: ${{ inputs.command }}
        FIX: ${{ inputs.fix }}
      run: |
        args=("$COMMAND")
        if [ "$FIX" = "true" ]; then
          args+=("--fix")
        fi
        bunx coaligned "${args[@]}"
