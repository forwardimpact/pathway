name: Claude Prompt
description: Install Claude Code and run a prompt in non-interactive mode

inputs:
  prompt:
    description: The prompt to send to Claude Code
    required: true
  agent:
    description: Agent profile to use (must exist in .claude/agents/)
    required: false
    default: ""
  allowed-tools:
    description: Comma-separated list of tools to allow without prompting
    required: false
    default: "Bash,Read,Glob,Grep,Write,Edit"
  model:
    description: Claude model to use
    required: false
    default: "opus"
  max-turns:
    description: Maximum number of agentic turns
    required: false
    default: "50"
  trace:
    description: Enable trace capture and artifact upload
    required: false
    default: "true"
  trace-name:
    description: Artifact name for the trace
    required: false
    default: "claude-trace"
  wiki:
    description: Clone the repository wiki for shared agent memory
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install Claude Code
      shell: bash
      run: npm install -g @anthropic-ai/claude-code@2.1.87

    - name: Configure Git identity
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Clone wiki for shared memory
      id: clone-wiki
      if: inputs.wiki == 'true'
      shell: bash
      run: |
        WIKI_DIR="/tmp/wiki"
        REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.wiki.git"

        # Clone wiki (initialize if it doesn't exist yet)
        if ! git clone "https://x-access-token:${GH_TOKEN}@${REPO_URL#https://}" "$WIKI_DIR" 2>/dev/null; then
          mkdir -p "$WIKI_DIR"
          git -C "$WIKI_DIR" init
          git -C "$WIKI_DIR" config user.name "github-actions[bot]"
          git -C "$WIKI_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "# Agent Memory" > "$WIKI_DIR/Home.md"
          git -C "$WIKI_DIR" add .
          git -C "$WIKI_DIR" commit -m "Initialize wiki for agent memory"
        fi

        echo "wiki-dir=$WIKI_DIR" >> "$GITHUB_OUTPUT"

    - name: Configure shared memory directory
      if: inputs.wiki == 'true'
      shell: bash
      run: |
        WIKI_DIR="${{ steps.clone-wiki.outputs.wiki-dir }}"
        SETTINGS_FILE=".claude/settings.json"
        if [ -f "$SETTINGS_FILE" ]; then
          node -e "
            const fs = require('fs');
            const s = JSON.parse(fs.readFileSync('$SETTINGS_FILE', 'utf8'));
            s.autoMemoryDirectory = '$WIKI_DIR';
            fs.writeFileSync('$SETTINGS_FILE', JSON.stringify(s, null, 2) + '\n');
          "
        else
          echo '{"autoMemoryDirectory":"'"$WIKI_DIR"'"}' > "$SETTINGS_FILE"
        fi

    - name: Run Claude Code
      id: run
      shell: bash
      env:
        PROMPT: ${{ inputs.prompt }}
        AGENT: ${{ inputs.agent }}
        MODEL: ${{ inputs.model }}
        MAX_TURNS: ${{ inputs.max-turns }}
        TOOLS: ${{ inputs.allowed-tools }}
        TRACE_ENABLED: ${{ inputs.trace }}
      run: |
        AGENT_FLAG=""
        if [ -n "$AGENT" ]; then
          AGENT_FLAG="--agent $AGENT"
        fi

        if [ "$TRACE_ENABLED" = "true" ]; then
          TRACE_DIR=$(mktemp -d)
          echo "trace-dir=$TRACE_DIR" >> "$GITHUB_OUTPUT"

          echo "$PROMPT" | claude --print \
            --output-format stream-json --verbose \
            --model "$MODEL" \
            --max-turns "$MAX_TURNS" \
            --allowedTools "$TOOLS" \
            $AGENT_FLAG \
            | npx fit-eval tee "$TRACE_DIR/trace.ndjson"
        else
          echo "$PROMPT" | claude --print \
            --model "$MODEL" \
            --max-turns "$MAX_TURNS" \
            --allowedTools "$TOOLS" \
            $AGENT_FLAG
        fi

    - name: Upload trace artifact
      if:
        always() && inputs.trace == 'true' && steps.run.outputs.trace-dir != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: ${{ inputs.trace-name }}
        path: ${{ steps.run.outputs.trace-dir }}

    - name: Push wiki changes
      if: always() && inputs.wiki == 'true'
      shell: bash
      run: |
        WIKI_DIR="${{ steps.clone-wiki.outputs.wiki-dir }}"
        cd "$WIKI_DIR"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Stage all changes in the wiki
        git add -A
        if git diff --cached --quiet; then
          echo "No wiki changes to push"
          exit 0
        fi

        AGENT_NAME="${GITHUB_WORKFLOW// /-}"
        git commit -m "memory($AGENT_NAME): update from run $GITHUB_RUN_NUMBER"
        git push || echo "Wiki push failed (non-fatal)"
