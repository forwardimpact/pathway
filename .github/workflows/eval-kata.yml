name: "Eval: Kata"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    paths:
      - ".claude/skills/kata-*/**"
      - ".claude/agents/*.md"
      - "benchmarks/kata-skills/**"
      - ".github/workflows/eval-kata.yml"

concurrency:
  group: eval-kata-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/bootstrap
      - uses: forwardimpact/fit-benchmark@v1
        with:
          family: ./benchmarks/kata-skills
          runs: "5"
          max-turns: "25"
          judge-profile: judge
