name: "Agent: Technical Writer"

on:
  schedule:
    # Review docs after staff ships code. Paris (CEST) times below.
    - cron: "37 3 * * *" # Night shift — 05:37 Paris, finishes before 07:00
    - cron: "47 11 * * *" # Day shift   — 13:47 Paris, finishes before 15:00
    - cron: "47 19 * * *" # Swing shift — 21:47 Paris, finishes before 23:00
  workflow_dispatch:
    inputs:
      task-amend:
        description: "Additional text appended to the task prompt for steering"
        required: false
        type: string

permissions:
  contents: write

jobs:
  kata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/kata-action-agent
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          app-private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          agent-profile: "technical-writer"
          task-text: >-
            Assess the current state of your domain and act on the highest-priority finding.
          task-amend: ${{ inputs.task-amend }}
