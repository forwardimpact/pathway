name: Publish macOS App

on:
  push:
    tags: ["basecamp@v*"]

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Extract version from tag
        id: meta
        run: |
          # Tag format: basecamp@v1.2.3
          VERSION="${GITHUB_REF_NAME#*@v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Install Deno
        uses: denoland/setup-deno@909cc5acb0fdd60627fb858598759246509fa755 # v2
        with:
          deno-version: v2.x

      - name: Install just
        run: brew install just

      - name: Security audit
        run: npm audit --audit-level=high --workspaces

      - name: Build .pkg installer
        working-directory: products/basecamp
        run: just pkg

      - name: Verify .pkg exists
        working-directory: products/basecamp
        run: |
          PKG_FILE="dist/fit-basecamp-${{ steps.meta.outputs.version }}.pkg"
          if [ ! -f "$PKG_FILE" ]; then
            echo "Error: $PKG_FILE not found"
            ls -la dist/
            exit 1
          fi
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          echo "Built: $PKG_FILE ($(du -h "$PKG_FILE" | cut -f1))"
        id: verify

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "Basecamp ${{ steps.meta.outputs.version }}" \
            --generate-notes \
            products/basecamp/${{ steps.verify.outputs.pkg_file }}
        env:
          GH_TOKEN: ${{ github.token }}
