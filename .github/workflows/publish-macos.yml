name: Publish macOS App

on:
  push:
    tags: ["basecamp@v*"]

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: meta
        run: |
          # Tag format: basecamp@v1.2.3
          VERSION="${GITHUB_REF_NAME#*@v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Install Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Install just
        run: brew install just

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: ./.github/actions/audit

      - name: Run tests
        run: bun run test

      - name: Build .pkg installer
        working-directory: products/basecamp
        run: just pkg

      - name: Verify .pkg exists
        working-directory: products/basecamp
        run: |
          PKG_FILE="dist/fit-basecamp-${{ steps.meta.outputs.version }}.pkg"
          if [ ! -f "$PKG_FILE" ]; then
            echo "Error: $PKG_FILE not found"
            ls -la dist/
            exit 1
          fi
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          echo "Built: $PKG_FILE ($(du -h "$PKG_FILE" | cut -f1))"
        id: verify

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "Basecamp ${{ steps.meta.outputs.version }}" \
            --generate-notes \
            products/basecamp/${{ steps.verify.outputs.pkg_file }}
        env:
          GH_TOKEN: ${{ github.token }}
