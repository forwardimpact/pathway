name: Publish macOS App

on:
  push:
    tags: ["outpost@v*"]

jobs:
  build:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag
        id: meta
        run: |
          # Tag format: outpost@v1.2.3
          VERSION="${GITHUB_REF_NAME#*@v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/bootstrap

      - uses: ./.github/actions/audit

      - name: Run tests
        run: bun run test

      - name: Build .pkg installer
        working-directory: products/outpost
        run: just pkg

      - name: Verify .pkg exists
        working-directory: products/outpost
        run: |
          PKG_FILE="dist/fit-outpost-${{ steps.meta.outputs.version }}.pkg"
          if [ ! -f "$PKG_FILE" ]; then
            echo "Error: $PKG_FILE not found"
            ls -la dist/
            exit 1
          fi
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          echo "Built: $PKG_FILE ($(du -h "$PKG_FILE" | cut -f1))"
        id: verify

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --title "Outpost ${{ steps.meta.outputs.version }}" \
            --generate-notes \
            products/outpost/${{ steps.verify.outputs.pkg_file }}
        env:
          GH_TOKEN: ${{ github.token }}
