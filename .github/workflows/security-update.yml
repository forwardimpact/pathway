name: "Gemba: Security Update"

on:
  schedule:
    # Mon & Thu at 04:43 UTC — runs before preparers and mergers
    - cron: "43 4 * * 1,4"
  workflow_dispatch: # Manual trigger for testing or on-demand triage

concurrency:
  group: security-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate installation token
        id: ci-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.ci-token.outputs.token }}
          submodules: true

      - uses: ./.github/actions/bootstrap

      - name: Apply security updates
        uses: ./.github/actions/fit-eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.ci-token.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          task-text:
            Apply security updates, triage Dependabot PRs and address npm audit
            findings.
          agent-profile: "security-specialist"
          model: "opus"
          max-turns: "200"
