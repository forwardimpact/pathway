name: Website: Publish the Kata pages

on:
  push:
    branches: [main]
    paths:
      - "websites/kata/**"
      - "design/kata/**"
      - ".github/workflows/website-kata.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "website-kata"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/bootstrap

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - uses: ./.github/actions/audit

      - name: Build website
        run: bunx fit-doc build --src=websites/kata --out=dist

      - name: Copy CNAME file
        run: cp websites/kata/CNAME dist/

      - name: Upload site artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kata-pages
          path: dist

      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
          repositories: kata-pages

      - name: Trigger deployment
        env:
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
        run: |
          gh api repos/forwardimpact/kata-pages/dispatches \
            -f event_type=deploy \
            -f "client_payload[run_id]=${{ github.run_id }}"
