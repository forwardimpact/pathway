name: "Kata: Coaching"

on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Agent name to coach (e.g., security-engineer)"
        required: true
        type: string
      task-amend:
        description: "Additional text appended to the task prompt for steering"
        required: false
        type: string

concurrency:
  group: kata-coaching
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  kata:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/kata-action-agent
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          app-private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          mode: "facilitate"
          task-text: >-
            Facilitate a one-on-one Kata coaching session with "${{ inputs.agent }}".
          facilitator-profile: "improvement-coach"
          agent-profiles: "${{ inputs.agent }}"
          task-amend: ${{ inputs.task-amend }}
