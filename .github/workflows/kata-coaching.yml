name: "Kata: Coaching"

on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Agent name to coach (e.g., security-engineer)"
        required: true
        type: string
      task-amend:
        description: "Additional text appended to the task prompt for steering"
        required: false
        type: string

concurrency:
  group: kata-coaching
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  kata:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.ci-app.outputs.token }}

      - uses: ./.github/actions/bootstrap
        with:
          token: ${{ steps.ci-app.outputs.token }}

      - name: 1-on-1 Coaching Session
        uses: ./.github/actions/kata-action
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          mode: "facilitate"
          task-text: >-
            Facilitate a one-on-one Kata coaching session with "${{ inputs.agent
            }}".
          facilitator-profile: "improvement-coach"
          agent-profiles: "${{ inputs.agent }}"
          model: "claude-opus-4-7[1m]"
          max-turns: "200"
          task-amend: ${{ inputs.task-amend }}
