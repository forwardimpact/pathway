name: "Kata: Interview"

on:
  workflow_dispatch:
    inputs:
      product:
        description: "Product to interview about (leave empty for supervisor to choose)"
        required: false
        type: string
      job:
        description: "Specific JTBD job goal to test (leave empty for supervisor to choose)"
        required: false
        type: string
      task-amend:
        description: "Additional text appended to the task prompt for steering"
        required: false
        type: string
      empty-corpus-test:
        description: "Force substrate-stage to see an empty corpus (CI assertion)"
        required: false
        type: boolean
        default: false

concurrency:
  group: kata-interview
  cancel-in-progress: true

permissions:
  contents: read
  # The "Scan logs for sensitive values" step downloads the in-progress
  # run's log archive via `gh api /repos/.../runs/{id}/logs`. The kata-
  # agent-team GitHub App installation may not carry Actions:Read, so
  # we let the scan step fall back to GITHUB_TOKEN with this scope.
  actions: read

jobs:
  interview:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.ci-app.outputs.token }}

      - uses: ./.github/actions/bootstrap
        with:
          token: ${{ steps.ci-app.outputs.token }}
          app-slug: kata-agent-team
          app-id: ${{ secrets.KATA_APP_ID }}

      # fit-map and its supabase-js dependency need Node 22+ for native
      # WebSocket. ubuntu-latest still ships Node 20 by default.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Prepare interview workspace
        id: agent-workspace
        shell: bash
        run: |
          agent_dir=$(mktemp -d)

          # Build synthetic data so the supervisor can stage the right
          # subset into the agent CWD per the chosen product. The skill's
          # staging table decides what gets copied.
          bunx fit-terrain build

          # Install the Supabase CLI globally — npm's global install is
          # blocked by supabase's postinstall script, so we use bun.
          # bun only symlinks its own binaries (bun, bunx) into
          # $HOME/.bun/bin/; third-party globals land in
          # $HOME/.bun/install/global/node_modules/.bin/. The Substrate
          # stage step's supabase-cli.js spawns `supabase` directly, so
          # we add the third-party bin dir to $GITHUB_PATH for the rest
          # of the job.
          bun install -g supabase
          echo "$HOME/.bun/install/global/node_modules/.bin" >> "$GITHUB_PATH"

          echo "dir=$agent_dir" >> "$GITHUB_OUTPUT"

      - name: Substrate stage
        id: substrate-stage
        if: inputs.product == 'landmark'
        shell: bash
        env:
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUBSTRATE_FORCE_EMPTY_CORPUS: ${{ inputs.empty-corpus-test }}
        run: |
          # $GITHUB_PATH from the previous step adds the bun third-party
          # bin dir; confirm `supabase` resolves before handing control
          # to fit-map so a future PATH regression surfaces here rather
          # than inside the substrate-cli error.
          which supabase || { echo "FAIL: supabase not on PATH after bun -g install" >&2; exit 1; }

          bunx fit-map substrate stage --cwd "${{ steps.agent-workspace.outputs.dir }}"

          # Propagate the local Supabase URL + anon key to subsequent
          # workflow steps. The Node process running `bunx fit-map
          # substrate stage` sets these in its own process.env only;
          # the supervisor's later `bunx fit-map substrate roster/issue`
          # invocations and the agent's `fit-landmark` spawns need them
          # via $GITHUB_ENV.
          # Supabase CLI ≥2.96 emits uppercase JSON keys (API_URL,
          # ANON_KEY) matching the default env-var names; older
          # versions used lowercase. Try both for compatibility.
          status_json=$(bunx --no-install -- supabase status --output json)
          api_url=$(echo "$status_json" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("API_URL") or d.get("api_url") or "")')
          anon_key=$(echo "$status_json" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("ANON_KEY") or d.get("anon_key") or "")')
          jwt_secret=$(echo "$status_json" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("JWT_SECRET") or d.get("jwt_secret") or "")')
          service_role_key=$(echo "$status_json" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("SERVICE_ROLE_KEY") or d.get("service_role_key") or "")')
          if [ -z "$api_url" ] || [ -z "$anon_key" ]; then
            echo "FAIL: supabase status did not yield api_url + anon_key" >&2
            echo "Raw JSON: $status_json" >&2
            exit 1
          fi
          # Mask the secret values so subsequent steps don't print
          # them in logs, then propagate to $GITHUB_ENV so the
          # supervisor's `substrate roster`/`substrate issue` and the
          # agent's fit-landmark spawns all see the live local-stack
          # values regardless of whether repo secrets are configured.
          if [ -n "$jwt_secret" ]; then echo "::add-mask::$jwt_secret"; fi
          if [ -n "$service_role_key" ]; then echo "::add-mask::$service_role_key"; fi
          echo "SUPABASE_URL=$api_url" >> "$GITHUB_ENV"
          echo "SUPABASE_ANON_KEY=$anon_key" >> "$GITHUB_ENV"
          if [ -n "$jwt_secret" ]; then echo "SUPABASE_JWT_SECRET=$jwt_secret" >> "$GITHUB_ENV"; fi
          if [ -n "$service_role_key" ]; then echo "SUPABASE_SERVICE_ROLE_KEY=$service_role_key" >> "$GITHUB_ENV"; fi

      - name: Compose task amendment
        id: amend
        shell: bash
        env:
          PRODUCT: ${{ inputs.product }}
          JOB: ${{ inputs.job }}
          USER_AMEND: ${{ inputs.task-amend }}
        run: |
          {
            echo 'amend<<AMEND_EOF'
            [ -n "$PRODUCT" ] && echo "Product: $PRODUCT"
            [ -n "$JOB" ] && echo "Job: $JOB"
            [ -n "$USER_AMEND" ] && echo "$USER_AMEND"
            echo 'AMEND_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run interview
        uses: forwardimpact/fit-eval@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
          AGENT_CWD: ${{ inputs.product == 'landmark' && steps.agent-workspace.outputs.dir || '' }}
          # SUPABASE_JWT_SECRET and SUPABASE_SERVICE_ROLE_KEY flow
          # through from $GITHUB_ENV (written by the Substrate stage
          # step after reading them from `supabase status`). Setting
          # them again here with `secrets.*` would overwrite the live
          # values with empty strings when the repo secrets aren't
          # configured.
        with:
          mode: "supervise"
          task-text: |
            Run the `kata-interview` skill.

            If a `Product:` or `Job:` line is appended below, honour it;
            otherwise the skill picks. Any other appended text is steering
            — pass it through.
          supervisor-cwd: "."
          agent-cwd: ${{ steps.agent-workspace.outputs.dir }}
          supervisor-profile: "product-manager"
          max-turns: "200"
          allowed-tools: "Bash,Read,Glob,Grep,Write,Edit,WebFetch,WebSearch"
          supervisor-allowed-tools: "Bash,Read,Glob,Grep,Write,Edit,Skill,TodoWrite"
          task-amend: ${{ steps.amend.outputs.amend }}

      - name: Scan logs for sensitive values
        if: always() && inputs.product == 'landmark'
        shell: bash
        env:
          # Use the workflow's own GITHUB_TOKEN (Actions:Read granted via
          # the workflow's `permissions:` block) rather than the kata-
          # agent-team app token, which may not carry Actions:Read.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          stash="$RUNNER_TEMP/.persona-jwt"
          if [ ! -f "$stash" ]; then
            echo "No persona-JWT stash at $stash — substrate issue did not run."
            persona_jwt=""
          else
            persona_jwt=$(cat "$stash")
            echo "::add-mask::$persona_jwt"
          fi

          # Download the in-progress run's log archive. GH serves the
          # archive of all completed-step logs even while the run is
          # active; only the scan step's own logs are excluded — fine,
          # since the scan step never echoes the JWT. Spec § Success
          # Criteria row 8 requires the assertion to fire non-zero on a
          # literal hit; a fail-open `exit 0` on download failure would
          # silently disarm the gate, so we fail closed.
          if ! gh api -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/logs" \
              > /tmp/run-logs.zip 2>/tmp/gh-err.log; then
            echo "FAIL: log archive download failed — gh api stderr:" >&2
            cat /tmp/gh-err.log >&2
            echo "App installation must carry 'Actions: Read'; see PR description." >&2
            exit 1
          fi
          if ! unzip -q /tmp/run-logs.zip -d /tmp/run-logs/; then
            echo "FAIL: log archive empty/unreadable — cannot verify scan." >&2
            exit 1
          fi

          fail=0
          # Spec § Success Criteria row 8: scan for all three literals.
          # GH Actions auto-masks the two repo secrets, so grepping for
          # them is normally a no-op — but the scan still performs the
          # grep so the criterion is satisfied literally and to catch the
          # unlikely case where GH's masker fails on a partial match.
          for pair in \
              "persona-jwt:$persona_jwt" \
              "jwt-secret:$JWT_SECRET" \
              "service-role-key:$SERVICE_ROLE_KEY"; do
            label="${pair%%:*}"
            value="${pair#*:}"
            [ -z "$value" ] && continue
            if grep -RFq -- "$value" /tmp/run-logs/; then
              echo "FAIL: $label literal in run logs" >&2
              fail=1
            fi
          done
          exit $fail
