name: "Kata: Dispatch"

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [labeled, closed]
  # NOTE: `pull_request_review_comment` is intentionally NOT a trigger.
  # A review submission fires N `pull_request_review_comment.created` events plus one
  # `pull_request_review.submitted` event in the same instant — all share the per-PR
  # concurrency group below, and with `cancel-in-progress: false` the cascade of
  # "newly pending cancels previously pending" cancels every run before any reaches
  # `in_progress` (observed on PR #1230, 2026-05-22; zero facilitators ran).
  # The `pull_request_review.submitted` payload already carries every inline diff
  # comment in the batch, so the facilitator can read them via the API — adding the
  # comment trigger back would reintroduce the race without adding any reachable
  # information. Standalone inline comments / thread replies are wrapped in an
  # auto-created `state: COMMENTED` review by GitHub, which also fires `submitted`.
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      prompt:
        description: "Ad-hoc prompt for the facilitator"
        required: true
        type: string
      callback_url:
        description: "URL to POST the facilitator conclusion to (optional)"
        required: false
        type: string
      correlation_id:
        description: "Correlation ID returned in the callback payload (optional)"
        required: false
        type: string
      discussion_id:
        description: "Stable identifier for the threaded conversation (carried through traces)"
        required: false
        type: string
      resume_context:
        description: "Serialized prior state when resuming a recessed run (JSON string)"
        required: false
        type: string

permissions:
  contents: write

# Coalesce simultaneous events on the same target so the recursion guard sees a stable thread.
# Triage flows fire `opened` plus several `labeled` events within ~1s; without this, each one
# spawns an independent facilitator → independent agent → independent PR (observed on #647 / #654).
#
# `cancel-in-progress: false` is load-bearing: facilitator runs routinely last 30+ minutes
# (e.g. staff engineer doing implementation work). A new label or comment arriving mid-run
# must NOT cancel that work, so flipping this to `true` is not an acceptable fix for any
# downstream race condition — adjust the trigger surface instead (see the `on:` block).
concurrency:
  group: kata-dispatch-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  kata:
    # Bot-authored content is allowed so this workflow can serve as an agent-to-agent coordination channel;
    # the task text contains a recursion guard that stops the facilitator when the latest activity is already
    # a participant agent's response.
    #
    # Label scoping: `labeled` fires once per label, and the product-manager bot applies several labels
    # in rapid succession on triage. Only react to labels that carry routing or approval semantics —
    # `agent:*` (routing) and `*:approved` (gate). Classification labels like `bug`, `triaged`, `experiment`
    # don't add new requests for the facilitator to act on, so they should not fire a run.
    #
    # PR close scoping: `closed` fires on both merge and abandon — only react when `merged: true` so
    # abandoned PRs don't fire a run.
    #
    # Trigger surface: this `if:` must stay aligned with the `on:` block above. There is intentionally
    # no `pull_request_review_comment` clause — see the NOTE on that trigger in `on:` for why adding one
    # back reintroduces the cancel-in-progress race (PR #1230).
    if: >-
      github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && (github.event.action == 'opened' || (github.event.action == 'labeled' && (startsWith(github.event.label.name, 'agent:') || endsWith(github.event.label.name, ':approved'))))) || github.event_name == 'issue_comment' || (github.event_name == 'pull_request_target' && ((github.event.action == 'labeled' && (startsWith(github.event.label.name, 'agent:') || endsWith(github.event.label.name, ':approved'))) || (github.event.action == 'closed' && github.event.pull_request.merged == true))) || github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.ci-app.outputs.token }}

      - uses: ./.github/actions/bootstrap
        with:
          token: ${{ steps.ci-app.outputs.token }}
          app-slug: kata-agent-team
          app-id: ${{ secrets.KATA_APP_ID }}

      - name: Compose task text
        id: task
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          DISPATCH_PROMPT: ${{ inputs.prompt }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.issue.number || github.event.pull_request.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          LABEL_NAME: ${{ github.event.label.name }}
          IS_PR: ${{ github.event.issue.pull_request != null }}
          AUTHOR: ${{ github.event.comment.user.login || github.event.review.user.login || github.event.issue.user.login || github.actor }}
          AUTHOR_TYPE: ${{ github.event.comment.user.type || github.event.review.user.type || github.event.issue.user.type || 'User' }}
          ITEM_URL: ${{ github.event.comment.html_url || github.event.review.html_url || github.event.issue.html_url || github.event.pull_request.html_url || '' }}
        run: |
          set -euo pipefail

          target_type="pull_request"
          target_number="${PR_NUMBER_FROM_EVENT:-}"

          case "$EVENT_NAME" in
            issues)
              target_type="issue"
              target_number="${PR_NUMBER_FROM_EVENT:-}"
              if [ "$EVENT_ACTION" = "labeled" ]; then
                context="Label \"$LABEL_NAME\" was added to issue \"$ISSUE_TITLE\" (#$target_number). Issue URL: $ITEM_URL."
                action="route to the best-suited agent."
              else
                context="A new issue was opened: \"$ISSUE_TITLE\" (#$target_number) by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Issue URL: $ITEM_URL."
                action="route to the best-suited agent and ask them to assess the issue and act on it."
              fi
              ;;
            pull_request_target)
              target_type="pull_request"
              target_number="${PR_NUMBER_FROM_EVENT:-}"
              if [ "$EVENT_ACTION" = "closed" ]; then
                context="PR \"$PR_TITLE\" (#$target_number) has been approved and merged. PR URL: $ITEM_URL."
              else
                context="Label \"$LABEL_NAME\" was added to PR \"$PR_TITLE\" (#$target_number). PR URL: $ITEM_URL."
              fi
              action="route to the best-suited agent."
              ;;
            workflow_dispatch)
              target_type=""
              target_number=""
              ;;
            issue_comment)
              if [ "$IS_PR" = "true" ]; then
                context="A new comment was posted on PR #$target_number by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Comment URL: $ITEM_URL."
                action="route to the best-suited agent and ask them to assess the comment and act on it."
              else
                target_type="issue"
                context="A new comment was posted on issue \"$ISSUE_TITLE\" (#$target_number) by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Comment URL: $ITEM_URL."
                action="route to the best-suited agent and ask them to assess the comment and act on it."
              fi
              ;;
            pull_request_review)
              context="A review was submitted on PR \"$PR_TITLE\" (#$target_number) by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Review URL: $ITEM_URL. The review payload bundles the review body together with any inline diff comments — fetch the full set when assessing."
              action="route to the best-suited agent and ask them to assess the review and act on it."
              ;;
            *)
              context="A new comment was posted on PR #$target_number by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Comment URL: $ITEM_URL."
              action="route to the best-suited agent and ask them to assess the comment and act on it."
              ;;
          esac

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            task_prefix="$DISPATCH_PROMPT"
          else
            task_prefix="$context As facilitator, $action"
          fi

          task="$task_prefix

          Ensure follow-through: when the agent answers, verify they acted on what was within their scope. If they acknowledged but deferred actionable work, send them back to complete it before you conclude.

          Approval propagation: when a trusted-contributor approval signal appears on a phase PR (e.g. \`<phase>:approved\` label applied, APPROVED review submitted, an approval comment such as 'approved', 'LGTM', 'ship it', or the PR has been merged), validate trust using the release-engineer trust gate (top-7 contributor or \`kata-agent-team\`) and edit \`wiki/STATUS.md\` to set the spec's row to the matching \`{phase} approved\` state. Commit the wiki edit; the Stop hook pushes it. Do **not** apply any approval label or submit an APPROVED review on behalf of any contributor — only propagate signals already expressed by trusted humans. See \`.claude/agents/references/approval-signals.md\` for the full signal catalogue.

          Recursion guard (this channel allows bot-authored content so agents can coordinate with each other): before engaging any participant, read the thread history. If the most recent activity is already a response from one of the participant agents you facilitate (product-manager, release-engineer, security-engineer, staff-engineer, technical-writer), stop immediately without engaging anyone — only respond when the latest content introduces a new question, request, or change for them to act on."

          # Heredoc delimiter must be unguessable: $task interpolates user-
          # controlled fields (issue title, PR title, label, author, URL).
          # A predictable delimiter would let an attacker inject extra
          # `key=value` lines into $GITHUB_OUTPUT — per GitHub Security
          # Lab template-injection guidance.
          delim="EOF_$(openssl rand -hex 16)"
          {
            echo "target-type=$target_type"
            echo "target-number=$target_number"
            echo "task<<$delim"
            echo "$task"
            echo "$delim"
          } >> "$GITHUB_OUTPUT"

      # Run the libeval CLI directly so Part 02's discuss mode + lead-flag
      # consolidation reach this workflow without a sibling-repo
      # composite-action retag. Selects discuss mode when discussion_id is
      # set (the bridge path), otherwise facilitate mode.
      #
      # Security: every untrusted dispatch input (DISPATCH_PROMPT,
      # DISCUSSION_ID, RESUME_CONTEXT) reaches the shell only via env:
      # declarations — never as ${{ }} interpolation inside the `run:`
      # block. The args=(...) array preserves whitespace and JSON contents.
      - name: Assess and Act
        id: assess
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
          DISPATCH_PROMPT: ${{ steps.task.outputs.task }}
          DISCUSSION_ID: ${{ inputs.discussion_id }}
          RESUME_CONTEXT: ${{ inputs.resume_context }}
          TARGET_TYPE: ${{ steps.task.outputs.target-type }}
          TARGET_NUMBER: ${{ steps.task.outputs.target-number }}
        run: |
          set -euo pipefail
          trace_file="$RUNNER_TEMP/trace.ndjson"
          args=(
            --task-text="$DISPATCH_PROMPT"
            --lead-profile=release-engineer
            --agent-profiles=product-manager,security-engineer,staff-engineer,technical-writer
            --max-turns=1500
            --output="$trace_file"
          )
          if [ -n "$DISCUSSION_ID" ]; then
            args+=( --discussion-id="$DISCUSSION_ID" )
            if [ -n "$RESUME_CONTEXT" ]; then
              args+=( --resume-context="$RESUME_CONTEXT" )
            fi
            node libraries/libeval/bin/fit-eval.js discuss "${args[@]}"
          else
            node libraries/libeval/bin/fit-eval.js facilitate "${args[@]}"
          fi
          echo "trace-file=$trace_file" >> "$GITHUB_OUTPUT"

      # Deliver the facilitator's conclusion to an external caller (e.g. the
      # MS Teams bridge or GitHub Discussions bridge) when one is specified
      # via workflow_dispatch. Skipped on issue/PR events where inputs is
      # null. Runs on both success and failure of the assess step so
      # callers always get a verdict — even when no trace was produced, we
      # POST a failure placeholder so the caller is never stranded.
      - name: Deliver callback
        if: github.event_name == 'workflow_dispatch' && always() && inputs.callback_url != ''
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          CORRELATION_ID: ${{ inputs.correlation_id }}
          DISCUSSION_ID: ${{ inputs.discussion_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRACE_FILE: ${{ steps.assess.outputs.trace-file }}
        run: |
          set -euo pipefail
          if [ -n "$TRACE_FILE" ] && [ -f "$TRACE_FILE" ]; then
            echo "Using trace file: $TRACE_FILE"
            node libraries/libeval/bin/fit-eval.js callback \
              --trace-file="$TRACE_FILE" \
              --callback-url="$CALLBACK_URL" \
              --correlation-id="$CORRELATION_ID" \
              --run-url="$RUN_URL" \
              --discussion-id="$DISCUSSION_ID"
          else
            echo "::warning::No trace file found — posting failure placeholder so the caller is not stranded"
            curl -fsS -X POST "$CALLBACK_URL" \
              -H 'Content-Type: application/json' \
              -d "$(jq -n \
                --arg cid "$CORRELATION_ID" \
                --arg run "$RUN_URL" \
                --arg did "$DISCUSSION_ID" \
                '{correlation_id: $cid, verdict: "failed", summary: "Facilitator session did not produce a trace; see run log.", run_url: $run, discussion_id: $did, replies: []}')"
          fi
