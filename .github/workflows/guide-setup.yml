name: Guide Setup

on:
  workflow_dispatch: # Manual trigger for on-demand evaluation

concurrency:
  group: guide-setup
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Generate installation token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          submodules: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - run: make install

      - name: Prepare agent workspace
        id: agent-workspace
        shell: bash
        run: |
          agent_dir=$(mktemp -d)
          cp scenarios/guide-setup/agent/CLAUDE.md "$agent_dir/CLAUDE.md"
          echo "dir=$agent_dir" >> "$GITHUB_OUTPUT"

      - name: Evaluate Guide Setup
        uses: ./.github/actions/fit-eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          mode: "supervise"
          task: scenarios/guide-setup/task.md
          supervisor-cwd: "."
          agent-cwd: ${{ steps.agent-workspace.outputs.dir }}
          supervisor-profile: "product-manager"
          model: "opus"
          max-turns: "50"
          allowed-tools: "Bash,Read,Glob,Grep,Write,Edit,WebFetch,WebSearch"
