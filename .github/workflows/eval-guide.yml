name: "Eval Guide"

on:
  workflow_dispatch:
    inputs:
      task-amend:
        description: "Additional text appended to the task prompt for steering"
        required: false
        type: string

concurrency:
  group: eval-guide
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  eval-guide:
    runs-on: ubuntu-latest
    steps:
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.ci-app.outputs.token }}

      - uses: ./.github/actions/bootstrap
        with:
          token: ${{ steps.ci-app.outputs.token }}
          app-slug: kata-agent-team
          app-id: ${{ secrets.KATA_APP_ID }}

      - name: Build data pipeline
        shell: bash
        run: |
          just data-init
          just synthetic
          just process-fast

      - name: Initialize Guide environment
        shell: bash
        run: |
          node -e "const m = await import('./products/guide/src/commands/init.js'); await m.runInitCommand();"
          # fit-guide init sets SERVICE_*_URL to grpc://localhost:* but gRPC
          # on Linux can fail when localhost resolves to ::1. The Client class
          # also remaps 0.0.0.0 to a .guide.local DNS name. Use 127.0.0.1.
          sed -i 's|grpc://localhost:|grpc://127.0.0.1:|g' .env
          sed -i 's|http://localhost:|http://127.0.0.1:|g' .env

      - name: Start services
        shell: bash
        run: |
          mkdir -p data/logs
          node -e "import('@forwardimpact/svcgraph/server.js')"    > data/logs/graph.log   2>&1 &
          node -e "import('@forwardimpact/svcpathway/server.js')"  > data/logs/pathway.log 2>&1 &
          node -e "import('@forwardimpact/svcmcp/server.js')"      > data/logs/mcp.log     2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3005/health > /dev/null 2>&1 && break
            [ "$i" -eq 30 ] && { echo "::error::MCP service failed to start"; cat data/logs/*.log; exit 1; }
            sleep 1
          done
          echo "Services started — checking data:"
          echo "  pathway files: $(find data/pathway -type f 2>/dev/null | wc -l)"
          echo "  knowledge files: $(find data/knowledge -name '*.html' 2>/dev/null | wc -l)"
          echo "  graph files: $(find data/graphs -type f 2>/dev/null | wc -l)"
          echo "  resource files: $(find data/resources -type f 2>/dev/null | wc -l)"

      - name: Smoke test gRPC
        shell: bash
        timeout-minutes: 2
        run: |
          # Test raw TCP connectivity first
          node -e "
            const net = await import('net');
            const sock = net.createConnection(3004, '127.0.0.1');
            sock.on('connect', () => { console.log('TCP connect OK to 127.0.0.1:3004'); sock.destroy(); process.exit(0); });
            sock.on('error', (e) => { console.error('TCP connect FAILED:', e.message); process.exit(1); });
            setTimeout(() => { console.error('TCP connect TIMEOUT'); process.exit(1); }, 5000);
          "

          # Test gRPC with deadline
          timeout 30 node -e "
            const { createClient, createGrpc } = await import('@forwardimpact/librpc');
            const { createLogger } = await import('@forwardimpact/libtelemetry');
            const { pathway } = await import('@forwardimpact/libtype');
            const grpc = createGrpc();
            const logger = createLogger('smoke');
            const client = await createClient('pathway', logger);
            const channel = client.getChannel?.() || client.client?.getChannel?.();
            if (channel) {
              const state = channel.getConnectivityState(true);
              console.log('Channel state:', state, '(0=IDLE, 1=CONNECTING, 2=READY, 3=TRANSIENT_FAILURE, 4=SHUTDOWN)');
            }
            const req = pathway.ListJobsRequest.fromObject({});
            console.log('Calling ListJobs with 10s deadline...');
            const deadline = new Date(Date.now() + 10000);
            const result = await client.ListJobs(req, { deadline });
            console.log('OK — content length:', result.content?.length ?? 0);
            process.exit(0);
          " || { echo 'gRPC call failed or timed out'; exit 1; }

      - name: Prepare agent workspace
        id: agent-workspace
        shell: bash
        run: echo "dir=$(mktemp -d)" >> "$GITHUB_OUTPUT"

      - name: Run eval
        uses: ./.github/actions/kata-action-eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          mode: "supervise"
          task-text: "Ask the agent to find the engineering standard for data engineering. The agent has MCP tools to query the knowledge base. Review the agent's findings for accuracy and completeness, then call Conclude with a summary indicating success or failure."
          supervisor-cwd: "."
          agent-cwd: ${{ steps.agent-workspace.outputs.dir }}
          model: "claude-opus-4-7[1m]"
          max-turns: "200"
          allowed-tools: "Bash,Read,Glob,Grep,Write,Edit"
          mcp-server: "guide"
          task-amend: ${{ inputs.task-amend }}

      - name: Dump service logs
        if: always()
        shell: bash
        run: |
          for f in data/logs/graph.log data/logs/pathway.log data/logs/mcp.log; do
            echo "=== $f ==="
            cat "$f" 2>/dev/null || echo "(not found)"
          done

      - name: Stop services
        if: always()
        shell: bash
        run: pkill -f "svcgraph\|svcpathway\|svcmcp" || true
