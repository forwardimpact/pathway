name: Publish Skills

on:
  push:
    branches: [main]
    paths:
      - ".claude/skills/fit-*/**"
      - ".claude/skills/kata-*/**"
      - ".github/workflows/publish-skills.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-fit-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          repositories: fit-skills

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: monorepo

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: forwardimpact/fit-skills
          token: ${{ steps.ci-app.outputs.token }}
          path: skills-repo

      - uses: ./monorepo/.github/actions/audit
        with:
          working-directory: monorepo
          vulnerability-scanning: "false"
          secret-scanning: "true"

      - name: Sync skills
        run: |
          rm -rf skills-repo/skills

          mkdir -p skills-repo/skills
          for skill_dir in monorepo/.claude/skills/fit-*/; do
            skill_name=$(basename "$skill_dir")
            cp -r "$skill_dir" "skills-repo/skills/$skill_name"
          done

      - name: Generate README
        run: |
          cat > skills-repo/README.md << 'EOF'
          # Forward Impact Skills

          Agent skills for the [Forward Impact](https://forwardimpact.team)
          engineering framework. Install with
          [npx skills](https://github.com/vercel-labs/skills):

          ```bash
          npx skills add forwardimpact/fit-skills
          ```

          ## Available Skills

          | Skill | Description |
          | --- | --- |
          EOF

          sed -i 's/^          //' skills-repo/README.md

          for skill_dir in skills-repo/skills/*/; do
            skill_md="$skill_dir/SKILL.md"
            if [ -f "$skill_md" ]; then
              name=$(sed -n 's/^name: *//p' "$skill_md" | head -1)
              desc=$(awk '
                /^description:/ {
                  sub(/^description: *>? */, "")
                  if ($0 != "") { desc = $0 }
                  while (getline > 0) {
                    if (/^  /) { gsub(/^  /, ""); desc = desc " " $0 }
                    else { break }
                  }
                  gsub(/^ +/, "", desc)
                  gsub(/ +$/, "", desc)
                  print desc
                  exit
                }
              ' "$skill_md")
              echo "| **${name}** | ${desc} |" >> skills-repo/README.md
            fi
          done

      - name: Commit and push
        working-directory: skills-repo
        run: |
          git config user.name "forward-impact-ci[bot]"
          git config user.email "${{ secrets.CI_APP_ID }}+forward-impact-ci[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
          else
            git commit -m "chore: sync skills from monorepo"
            git push
          fi

  publish-kata-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          repositories: kata-skills

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: monorepo

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: forwardimpact/kata-skills
          token: ${{ steps.ci-app.outputs.token }}
          path: skills-repo

      - uses: ./monorepo/.github/actions/audit
        with:
          working-directory: monorepo
          vulnerability-scanning: "false"
          secret-scanning: "true"

      - name: Sync skills
        run: |
          rm -rf skills-repo/skills

          mkdir -p skills-repo/skills
          for skill_dir in monorepo/.claude/skills/kata-*/; do
            skill_name=$(basename "$skill_dir")
            cp -r "$skill_dir" "skills-repo/skills/$skill_name"
          done

      - name: Generate README
        run: |
          cat > skills-repo/README.md << 'EOF'
          # Kata Skills

          Agent skills for the [Forward Impact](https://forwardimpact.team)
          Kata Agent Team. Install with
          [npx skills](https://github.com/vercel-labs/skills):

          ```bash
          npx skills add forwardimpact/kata-skills
          ```

          ## Available Skills

          | Skill | Description |
          | --- | --- |
          EOF

          sed -i 's/^          //' skills-repo/README.md

          for skill_dir in skills-repo/skills/*/; do
            skill_md="$skill_dir/SKILL.md"
            if [ -f "$skill_md" ]; then
              name=$(sed -n 's/^name: *//p' "$skill_md" | head -1)
              desc=$(awk '
                /^description:/ {
                  sub(/^description: *>? */, "")
                  if ($0 != "") { desc = $0 }
                  while (getline > 0) {
                    if (/^  /) { gsub(/^  /, ""); desc = desc " " $0 }
                    else { break }
                  }
                  gsub(/^ +/, "", desc)
                  gsub(/ +$/, "", desc)
                  print desc
                  exit
                }
              ' "$skill_md")
              echo "| **${name}** | ${desc} |" >> skills-repo/README.md
            fi
          done

      - name: Commit and push
        working-directory: skills-repo
        run: |
          git config user.name "forward-impact-ci[bot]"
          git config user.email "${{ secrets.CI_APP_ID }}+forward-impact-ci[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
          else
            git commit -m "chore: sync skills from monorepo"
            git push
          fi
