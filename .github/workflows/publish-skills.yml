name: Publish Skills

on:
  push:
    branches: [main]
    paths:
      - ".claude/skills/fit-*/**"
      - ".github/workflows/publish-skills.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Generate installation token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          repositories: skills

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: monorepo

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: forwardimpact/skills
          token: ${{ steps.app-token.outputs.token }}
          path: skills-repo

      - uses: ./monorepo/.github/actions/audit
        with:
          working-directory: monorepo
          vulnerability-scanning: "false"
          secret-scanning: "true"

      - name: Sync skills
        run: |
          # Clean existing skills (full replace, not merge)
          rm -rf skills-repo/skills

          # Copy each fit-* skill directory
          mkdir -p skills-repo/skills
          for skill_dir in monorepo/.claude/skills/fit-*/; do
            skill_name=$(basename "$skill_dir")
            cp -r "$skill_dir" "skills-repo/skills/$skill_name"
          done

      - name: Generate README
        run: |
          cat > skills-repo/README.md << 'EOF'
          # Forward Impact Skills

          Agent skills for the [Forward Impact](https://forwardimpact.team)
          engineering framework. Install with
          [npx skills](https://github.com/vercel-labs/skills):

          ```bash
          npx skills add forwardimpact/skills
          ```

          ## Available Skills

          | Skill | Description |
          | --- | --- |
          EOF

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' skills-repo/README.md

          # Append a table row for each skill from its SKILL.md frontmatter
          for skill_dir in skills-repo/skills/*/; do
            skill_md="$skill_dir/SKILL.md"
            if [ -f "$skill_md" ]; then
              name=$(sed -n 's/^name: *//p' "$skill_md" | head -1)
              desc=$(awk '
                /^description:/ {
                  sub(/^description: *>? */, "")
                  if ($0 != "") { desc = $0 }
                  while (getline > 0) {
                    if (/^  /) { gsub(/^  /, ""); desc = desc " " $0 }
                    else { break }
                  }
                  gsub(/^ +/, "", desc)
                  gsub(/ +$/, "", desc)
                  print desc
                  exit
                }
              ' "$skill_md")
              echo "| **${name}** | ${desc} |" >> skills-repo/README.md
            fi
          done

      - name: Commit and push
        working-directory: skills-repo
        run: |
          git config user.name "forward-impact-ci[bot]"
          git config user.email "${{ secrets.CI_APP_ID }}+forward-impact-ci[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish"
          else
            git commit -m "chore: sync skills from monorepo"
            git push
          fi
