name: Product Backlog

on:
  schedule:
    # Daily at 09:13 UTC (off-minute to avoid :00 stampede)
    - cron: "13 9 * * *"
  workflow_dispatch: # Manual trigger for on-demand backlog triage

concurrency:
  group: product-backlog
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate installation token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          submodules: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - run: make install

      - name: Triage Product Backlog
        uses: ./.github/actions/claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          prompt: >
            Review all open pull requests for product alignment. Classify each
            by type, verify the author is a top contributor, check CI status,
            and merge fix, bug, and spec PRs that pass all gates. Use the
            write-spec skill's review process for any spec PRs before merging.
          agent: "product-manager"
          model: "opus"
          max-turns: "50"
