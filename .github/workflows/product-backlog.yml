name: Product Backlog

on:
  schedule:
    # Daily at 09:13 UTC (off-minute to avoid :00 stampede)
    - cron: "13 9 * * *"
  workflow_dispatch: # Manual trigger for on-demand backlog triage

concurrency:
  group: product-backlog
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate installation token
        id: app-token
        uses: actions/create-github-app-token@67e27a7eb7db372a1c61a7f9bdab8699e9ee57f7 # v1
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: make install

      - name: Triage Product Backlog
        uses: ./.github/actions/claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          prompt: >
            Review all open pull requests for product alignment. Classify each
            by type, verify the author is a top contributor, check CI status,
            and merge fix, bug, and spec PRs that pass all gates. Use the
            review-spec skill for any spec PRs before merging.
          agent: "product-manager"
          model: "opus"
          max-turns: "50"
