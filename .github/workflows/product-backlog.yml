name: "Gemba: Product Backlog"

on:
  schedule:
    # Daily at 08:13 UTC — merges PRs after CI runs on rebased branches
    - cron: "13 8 * * *"
  workflow_dispatch: # Manual trigger for on-demand backlog triage
    inputs:
      task-amend:
        description: "Additional text appended to the task prompt for steering"
        required: false
        type: string

concurrency:
  group: product-backlog
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.ci-app.outputs.token }}
          submodules: true

      - uses: ./.github/actions/bootstrap

      - name: Triage Product Backlog
        uses: ./.github/actions/gemba-action
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          task-text: Triage the product backlog.
          agent-profile: "product-manager"
          model: "opus"
          max-turns: "200"
          task-amend: ${{ inputs.task-amend }}
