name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: forwardimpact/fit-bootstrap@v1
      - run: bun run format

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: forwardimpact/fit-bootstrap@v1
      - run: bun run lint

  jsdoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: forwardimpact/fit-bootstrap@v1
      - run: bun run jsdoc

  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: forwardimpact/fit-bootstrap@v1
      - run: bun run invariants

  wiki-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: forwardimpact/fit-bootstrap@v1
      - name: Checkout wiki (read-only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
      - name: fit-wiki audit
        run: |
          export FIT_WIKI_AUDIT_GRACE_UNTIL=$(date -u -d '+30 days' +%Y-%m-%d)
          bunx fit-wiki audit
