name: "Agent: React"

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [labeled]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  discussion:
    types: [created]
  discussion_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      target-type:
        description: "Target type (pull_request or discussion)"
        required: true
        type: choice
        default: pull_request
        options:
          - pull_request
          - discussion
      target-number:
        description: "PR or discussion number to act on (manual trigger for verification)"
        required: true
        type: string

permissions:
  contents: write

# Coalesce simultaneous events on the same target so the recursion guard sees a stable thread.
# Triage flows fire `opened` plus several `labeled` events within ~1s; without this, each one
# spawns an independent facilitator → independent agent → independent PR (observed on #647 / #654).
concurrency:
  group: agent-react-${{ github.event.issue.number || github.event.pull_request.number || github.event.discussion.number || inputs.target-number || github.run_id }}
  cancel-in-progress: false

jobs:
  kata:
    # Bot-authored content is allowed so this workflow can serve as an agent-to-agent coordination channel;
    # the task text contains a recursion guard that stops the facilitator when the latest activity is already
    # a participant agent's response. For pull_request_review_comment, only run on thread replies
    # (in_reply_to_id set) — top-level review comments are delivered via the pull_request_review (submitted)
    # event in a single batch.
    #
    # Label scoping: `labeled` fires once per label, and the product-manager bot applies several labels
    # in rapid succession on triage. Only react to labels that carry routing or approval semantics —
    # `agent:*` (routing) and `*:approved` (gate). Classification labels like `bug`, `triaged`, `experiment`
    # don't add new requests for the facilitator to act on, so they should not fire a run.
    if: >-
      github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && (github.event.action == 'opened' || (github.event.action == 'labeled' && (startsWith(github.event.label.name, 'agent:') || endsWith(github.event.label.name, ':approved'))))) || github.event_name == 'issue_comment' || (github.event_name == 'pull_request_target' && (startsWith(github.event.label.name, 'agent:') || endsWith(github.event.label.name, ':approved'))) || (github.event_name == 'pull_request_review_comment' && github.event.comment.in_reply_to_id != null) || github.event_name == 'pull_request_review' || github.event_name == 'discussion' || github.event_name == 'discussion_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.ci-app.outputs.token }}

      - uses: ./.github/actions/bootstrap
        with:
          token: ${{ steps.ci-app.outputs.token }}
          app-slug: kata-agent-team
          app-id: ${{ secrets.KATA_APP_ID }}

      - name: Compose task text
        id: task
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          DISPATCH_TARGET_TYPE: ${{ inputs.target-type }}
          DISPATCH_TARGET_NUMBER: ${{ inputs.target-number }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.issue.number || github.event.pull_request.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          LABEL_NAME: ${{ github.event.label.name }}
          DISCUSSION_NUMBER: ${{ github.event.discussion.number }}
          DISCUSSION_NODE_ID: ${{ github.event.discussion.node_id }}
          DISCUSSION_TITLE: ${{ github.event.discussion.title }}
          DISCUSSION_CATEGORY: ${{ github.event.discussion.category.name }}
          IS_PR: ${{ github.event.issue.pull_request != null }}
          AUTHOR: ${{ github.event.comment.user.login || github.event.review.user.login || github.event.discussion.user.login || github.event.issue.user.login || github.actor }}
          AUTHOR_TYPE: ${{ github.event.comment.user.type || github.event.review.user.type || github.event.discussion.user.type || github.event.issue.user.type || 'User' }}
          ITEM_URL: ${{ github.event.comment.html_url || github.event.review.html_url || github.event.discussion.html_url || github.event.issue.html_url || github.event.pull_request.html_url || '' }}
        run: |
          set -euo pipefail

          target_type="pull_request"
          target_number="${PR_NUMBER_FROM_EVENT:-}"

          case "$EVENT_NAME" in
            issues)
              target_type="issue"
              target_number="${PR_NUMBER_FROM_EVENT:-}"
              if [ "$EVENT_ACTION" = "labeled" ]; then
                context="Label \"$LABEL_NAME\" was added to issue \"$ISSUE_TITLE\" (#$target_number). Issue URL: $ITEM_URL."
                action="route to the best-suited agent."
              else
                context="A new issue was opened: \"$ISSUE_TITLE\" (#$target_number) by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Issue URL: $ITEM_URL."
                action="route to the best-suited agent and ask them to assess the issue and act on it."
              fi
              ;;
            pull_request_target)
              target_type="pull_request"
              target_number="${PR_NUMBER_FROM_EVENT:-}"
              context="Label \"$LABEL_NAME\" was added to PR \"$PR_TITLE\" (#$target_number). PR URL: $ITEM_URL."
              action="route to the best-suited agent."
              ;;
            discussion)
              target_type="discussion"
              target_number="$DISCUSSION_NUMBER"
              context="A new discussion was opened: \"$DISCUSSION_TITLE\" (#$target_number, category: $DISCUSSION_CATEGORY) by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Discussion URL: $ITEM_URL. Discussion node ID: $DISCUSSION_NODE_ID."
              action="route to the best-suited agent and ask them to assess the discussion and act on it. To reply, use \`gh api graphql\` (mutation \`addDiscussionComment\` with the discussion node ID)."
              ;;
            discussion_comment)
              target_type="discussion"
              target_number="$DISCUSSION_NUMBER"
              context="A new comment was posted on discussion \"$DISCUSSION_TITLE\" (#$target_number, category: $DISCUSSION_CATEGORY) by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Comment URL: $ITEM_URL. Discussion node ID: $DISCUSSION_NODE_ID."
              action="route to the best-suited agent and ask them to assess the comment and act on it. To reply, use \`gh api graphql\` (mutation \`addDiscussionComment\` with the discussion node ID; pass \`replyToId\` to thread the reply)."
              ;;
            workflow_dispatch)
              if [ "$DISPATCH_TARGET_TYPE" = "discussion" ]; then
                target_type="discussion"
                target_number="$DISPATCH_TARGET_NUMBER"
                context="Manual dispatch targeting discussion #$target_number (event: $EVENT_NAME)."
                action="route to the best-suited agent and ask them to assess the discussion and act on it. To reply, use \`gh api graphql\` (mutation \`addDiscussionComment\`)."
              else
                target_type="pull_request"
                target_number="$DISPATCH_TARGET_NUMBER"
                context="Manual dispatch targeting PR #$target_number (event: $EVENT_NAME)."
                action="route to the best-suited agent and ask them to assess the PR and act on it."
              fi
              ;;
            issue_comment)
              if [ "$IS_PR" = "true" ]; then
                context="A new comment was posted on PR #$target_number by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Comment URL: $ITEM_URL."
                action="route to the best-suited agent and ask them to assess the comment and act on it."
              else
                target_type="issue"
                context="A new comment was posted on issue \"$ISSUE_TITLE\" (#$target_number) by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Comment URL: $ITEM_URL."
                action="route to the best-suited agent and ask them to assess the comment and act on it."
              fi
              ;;
            *)
              context="A new comment was posted on PR #$target_number by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Comment URL: $ITEM_URL."
              action="route to the best-suited agent and ask them to assess the comment and act on it."
              ;;
          esac

          task="$context As facilitator, $action

          Ensure follow-through: when the agent answers, verify they acted on what was within their scope. If they acknowledged but deferred actionable work, send them back to complete it before you conclude.

          Approval translation: when a thread participant signals approval on a phase PR (e.g. 'approved', 'LGTM', 'ship it' on a spec/design/plan PR by a trusted account), translate it into the canonical signal — \`gh pr review --approve\` and/or \`gh pr edit --add-label <phase>:approved\` — before concluding.

          Recursion guard (this channel allows bot-authored content so agents can coordinate with each other): before engaging any participant, read the thread history. If the most recent activity is already a response from one of the participant agents you facilitate (product-manager, release-engineer, security-engineer, staff-engineer, technical-writer), stop immediately without engaging anyone — only respond when the latest content introduces a new question, request, or change for them to act on."

          {
            echo "target-type=$target_type"
            echo "target-number=$target_number"
            echo "task<<TASK_EOF"
            echo "$task"
            echo "TASK_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Assess and Act
        uses: ./.github/actions/kata-action-eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
          TARGET_TYPE: ${{ steps.task.outputs.target-type }}
          TARGET_NUMBER: ${{ steps.task.outputs.target-number }}
        with:
          mode: "facilitate"
          task-text: ${{ steps.task.outputs.task }}
          facilitator-profile: "release-engineer"
          agent-profiles: "product-manager,security-engineer,staff-engineer,technical-writer"
          model: "claude-opus-4-7[1m]"
          max-turns: "200"
