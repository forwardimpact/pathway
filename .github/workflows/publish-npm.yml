name: Publish Package

on:
  push:
    tags: ["*@v*"]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Extract package name from tag
        id: package
        run: |
          TAG_NAME="${GITHUB_REF_NAME%%@v*}"
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          # Find the npm package name and directory from the tag
          PKG_JSON=$(bun -e "
            const { workspaces } = require('./package.json');
            const tag = '${TAG_NAME}';
            for (const ws of workspaces) {
              const pkg = require('./' + ws + '/package.json');
              if (pkg.name.endsWith('/' + tag)) {
                console.log(JSON.stringify({ name: pkg.name, path: ws }));
                break;
              }
            }
          ")
          echo "npm_name=$(echo "$PKG_JSON" | jq -r '.name')" >> $GITHUB_OUTPUT
          echo "dir_name=$(echo "$PKG_JSON" | jq -r '.path')" >> $GITHUB_OUTPUT

      - name: Install dependencies and generate code
        run: make install

      - uses: ./.github/actions/audit

      - name: Run tests
        run: bun run test

      - name: Copy LICENSE to package
        run: cp LICENSE ${{ steps.package.outputs.dir_name }}/

      - name: Publish to npm
        run:
          npm publish --workspace=${{ steps.package.outputs.npm_name }}
          --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
