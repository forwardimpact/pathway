name: Publish Package

on:
  push:
    tags: ["*@v*"]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/bootstrap

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Extract package name from tag
        id: package
        run: |
          TAG_NAME="${GITHUB_REF_NAME%%@v*}"
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          # Find the npm package name and directory from the tag
          # Workspaces use glob patterns — resolve them with Glob.sync
          PKG_JSON=$(bun -e "
            const { globSync } = require('node:fs');
            const { workspaces } = require('./package.json');
            const tag = '${TAG_NAME}';
            const dirs = workspaces.flatMap(ws => globSync(ws, { withFileTypes: false }));
            for (const dir of dirs) {
              try {
                const pkg = require('./' + dir + '/package.json');
                if (pkg.name.endsWith('/' + tag)) {
                  console.log(JSON.stringify({ name: pkg.name, path: dir }));
                  break;
                }
              } catch {}
            }
          ")
          echo "npm_name=$(echo "$PKG_JSON" | jq -r '.name')" >> $GITHUB_OUTPUT
          echo "dir_name=$(echo "$PKG_JSON" | jq -r '.path')" >> $GITHUB_OUTPUT

      - uses: ./.github/actions/audit

      - name: Run tests
        run: bun run test

      - name: Smoke test npm package
        run: |
          PACK_DIR=$(mktemp -d)
          TARBALL=$(npm pack --workspace=${{ steps.package.outputs.npm_name }} --pack-destination="$PACK_DIR")
          cd "$PACK_DIR"
          npm init -y
          npm install "$TARBALL"
          # Verify the main entry point is resolvable (skip for bin-only packages)
          HAS_MAIN=$(node -e "const p=JSON.parse(require('fs').readFileSync('node_modules/${{ steps.package.outputs.npm_name }}/package.json','utf8')); if(p.main||p.exports) console.log('yes')")
          if [ -n "$HAS_MAIN" ]; then
            node -e "require.resolve('${{ steps.package.outputs.npm_name }}')"
          fi
          # Verify CLI entry point file exists (don't execute — workspace deps missing in isolation)
          BIN=$(node -e "const p=JSON.parse(require('fs').readFileSync('node_modules/${{ steps.package.outputs.npm_name }}/package.json','utf8')); const b=Object.values(p.bin||{})[0]; if(b) console.log(b)")
          if [ -n "$BIN" ]; then
            test -f "node_modules/${{ steps.package.outputs.npm_name }}/$BIN"
          fi
          rm -rf "$PACK_DIR"

      - name: Copy LICENSE to package
        run: cp LICENSE ${{ steps.package.outputs.dir_name }}/

      - name: Publish to npm
        run:
          npm publish --workspace=${{ steps.package.outputs.npm_name }}
          --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
