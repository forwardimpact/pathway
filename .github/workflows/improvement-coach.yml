name: Improvement Coach

on:
  schedule:
    # Weekly on Wednesdays at 08:47 UTC (off-minute to avoid :00 stampede)
    - cron: "47 8 * * 3"
  workflow_dispatch: # Manual trigger for on-demand analysis

concurrency:
  group: improvement-coach
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  coach:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.CLAUDE_GH_TOKEN }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: make install

      - name: Analyze Agent Traces
        uses: ./.github/actions/claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.CLAUDE_GH_TOKEN }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          prompt: >
            Pick one recent agent workflow run at random and deep-analyze its
            trace using the grounded-theory-analysis skill. Implement trivial
            fixes as PRs and write specs for larger improvements.
          agent: "improvement-coach"
          model: "opus"
          max-turns: "50"
