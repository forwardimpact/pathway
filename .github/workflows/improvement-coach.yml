name: "Gemba: Improvement Coach"

on:
  schedule:
    # Wed & Sat at 10:47 UTC — analyzes traces after all other agents
    - cron: "47 10 * * 3,6"
  workflow_dispatch: # Manual trigger for on-demand analysis

concurrency:
  group: improvement-coach
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  coach:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate installation token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          submodules: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - run: make install

      - name: Analyze Agent Traces
        uses: ./.github/actions/fit-eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          task-text: Walk the gemba and act on findings.
          agent-profile: "improvement-coach"
          model: "opus"
          max-turns: "200"
