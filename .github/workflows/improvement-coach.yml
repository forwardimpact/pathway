name: Improvement Coach

on:
  schedule:
    # Weekly on Wednesdays at 08:47 UTC (off-minute to avoid :00 stampede)
    - cron: "47 8 * * 3"
  workflow_dispatch: # Manual trigger for on-demand analysis

concurrency:
  group: improvement-coach
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  coach:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate installation token
        id: app-token
        uses: actions/create-github-app-token@67e27a7eb7db372a1c61a7f9bdab8699e9ee57f7 # v1
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          submodules: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - run: make install

      - name: Analyze Agent Traces
        uses: ./.github/actions/claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          prompt: >
            Pick one recent agent workflow run at random and deep-analyze its
            trace using the grounded-theory-analysis skill. Implement trivial
            fixes as PRs and write specs for larger improvements.
          agent: "improvement-coach"
          model: "opus"
          max-turns: "50"
