name: "Gemba: Security Audit"

on:
  schedule:
    # Tue & Fri at 04:07 UTC — runs before preparers and mergers
    - cron: "7 4 * * 2,5"
  workflow_dispatch: # Manual trigger for on-demand audits

concurrency:
  group: security-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate installation token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2
      - run: just install

      - name: Run Security Audit
        uses: ./.github/actions/fit-eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          task-text: Audit one topic and act on findings.
          agent-profile: "security-specialist"
          model: "opus"
          max-turns: "200"
