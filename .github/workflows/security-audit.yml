name: Security Audit

on:
  schedule:
    # Every 2 days at 04:43 UTC (off-minute to avoid :00 stampede)
    - cron: "43 4 */2 * *"
  workflow_dispatch: # Manual trigger for on-demand audits

concurrency:
  group: security-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: make install

      - name: Run Security Audit
        uses: ./.github/actions/claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.CLAUDE_GH_TOKEN }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          prompt: "Perform a security audit of the repository."
          agent: "security-engineer"
          model: "opus"
          max-turns: "50"
