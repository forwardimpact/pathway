name: "Kata: Shift"

# Sequential agent team. The matrix below is the roster — add or remove an
# agent by editing one line. Agents run in declaration order, one at a time
# (`max-parallel: 1`), on every scheduled or manual invocation. KATA.md
# describes the rhythm.

on:
  schedule:
    - cron: "0 1 * * *" # 03:00 Paris (CEST)
    - cron: "0 10 * * *" # 12:00 Paris (CEST)
    - cron: "0 18 * * *" # 20:00 Paris (CEST)
  workflow_dispatch:
    inputs:
      task-amend:
        description: "Additional text appended to the task prompt for steering"
        required: false
        type: string

permissions:
  contents: write

jobs:
  agent:
    name: ${{ matrix.agent.name }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        agent:
          - { name: product-manager }
          - { name: staff-engineer }
          - { name: security-engineer }
          - { name: technical-writer }
          - { name: release-engineer }
          - { name: improvement-coach }
    steps:
      - uses: forwardimpact/kata-agent@v1
        with:
          app-id: ${{ secrets.KATA_APP_ID }}
          app-private-key: ${{ secrets.KATA_APP_PRIVATE_KEY }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          agent-profile: ${{ matrix.agent.name }}
          case: ${{ matrix.agent.name }}
          max-turns: ${{ matrix.agent.max-turns || '1500' }}
          timeout-minutes: "300"
          task-text: >-
            Assess the current state of your domain and act on the highest-priority finding.
          task-amend: ${{ inputs.task-amend }}
