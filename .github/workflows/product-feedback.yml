name: "Gemba: Product Feedback"

on:
  schedule:
    # Mon, Wed, Fri at 05:17 UTC — creates work before preparers and mergers
    - cron: "17 5 * * 1,3,5"
  workflow_dispatch: # Manual trigger for on-demand issue triage

concurrency:
  group: product-feedback
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Generate installation token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          submodules: true

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - uses: extractions/setup-just@e33e0265a09d0d9e33f4558b0461f616a6b44220 # v2
      - run: just install

      - name: Triage Open Issues
        uses: ./.github/actions/fit-eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          task-text: Triage product feedback.
          agent-profile: "product-manager"
          model: "opus"
          max-turns: "200"
