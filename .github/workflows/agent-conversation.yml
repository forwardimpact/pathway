name: "Agent: Conversation"

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  discussion:
    types: [created]
  discussion_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      target-type:
        description: "Target type (pull_request or discussion)"
        required: true
        type: choice
        default: pull_request
        options:
          - pull_request
          - discussion
      target-number:
        description: "PR or discussion number to act on (manual trigger for verification)"
        required: true
        type: string

concurrency:
  group: agent-conversation-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number || github.event.discussion.number || inputs.target-number }}-${{ github.event.comment.id || github.event.review.id || github.event.discussion.id || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  kata:
    # Bot-authored content is allowed so this workflow can serve as an agent-to-agent coordination channel;
    # the task text contains a recursion guard that stops the facilitator when the latest activity is already
    # a participant agent's response. Require issue_comment events to be on PRs (issue_comment also fires for
    # issues — new issues are handled via the dedicated `issues` event). For pull_request_review_comment, only
    # run on thread replies (in_reply_to_id set) — top-level review comments are delivered via the
    # pull_request_review (submitted) event in a single batch.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'issues' || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) || (github.event_name == 'pull_request_review_comment' && github.event.comment.in_reply_to_id != null) || github.event_name == 'pull_request_review' || github.event_name == 'discussion' || github.event_name == 'discussion_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Generate installation token
        id: ci-app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.ci-app.outputs.token }}

      - uses: ./.github/actions/bootstrap
        with:
          token: ${{ steps.ci-app.outputs.token }}

      - name: Compose task text
        id: task
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TARGET_TYPE: ${{ inputs.target-type }}
          DISPATCH_TARGET_NUMBER: ${{ inputs.target-number }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.issue.number || github.event.pull_request.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          DISCUSSION_NUMBER: ${{ github.event.discussion.number }}
          DISCUSSION_NODE_ID: ${{ github.event.discussion.node_id }}
          DISCUSSION_TITLE: ${{ github.event.discussion.title }}
          DISCUSSION_CATEGORY: ${{ github.event.discussion.category.name }}
          AUTHOR: ${{ github.event.comment.user.login || github.event.review.user.login || github.event.discussion.user.login || github.event.issue.user.login || github.actor }}
          AUTHOR_TYPE: ${{ github.event.comment.user.type || github.event.review.user.type || github.event.discussion.user.type || github.event.issue.user.type || 'User' }}
          ITEM_URL: ${{ github.event.comment.html_url || github.event.review.html_url || github.event.discussion.html_url || github.event.issue.html_url || '' }}
        run: |
          set -euo pipefail

          target_type="pull_request"
          target_number="${PR_NUMBER_FROM_EVENT:-}"

          case "$EVENT_NAME" in
            issues)
              target_type="issue"
              target_number="${PR_NUMBER_FROM_EVENT:-}"
              context="A new issue was opened: \"$ISSUE_TITLE\" (#$target_number) by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Issue URL: $ITEM_URL."
              action="decide which participant agent is most appropriate to respond based on the issue body, then ask that single agent to read the issue and post a single helpful reply via \`gh issue comment\`. Do not push any commits in response to a new issue."
              ;;
            discussion)
              target_type="discussion"
              target_number="$DISCUSSION_NUMBER"
              context="A new discussion was opened: \"$DISCUSSION_TITLE\" (#$target_number, category: $DISCUSSION_CATEGORY) by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Discussion URL: $ITEM_URL. Discussion node ID: $DISCUSSION_NODE_ID."
              action="decide which participant agent is most appropriate to respond based on the discussion category and content, then ask that single agent to read the discussion body and post a single helpful reply via \`gh api graphql\` (mutation \`addDiscussionComment\` with the discussion node ID). Do not push any commits in response to a discussion."
              ;;
            discussion_comment)
              target_type="discussion"
              target_number="$DISCUSSION_NUMBER"
              context="A new comment was posted on discussion \"$DISCUSSION_TITLE\" (#$target_number, category: $DISCUSSION_CATEGORY) by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Comment URL: $ITEM_URL. Discussion node ID: $DISCUSSION_NODE_ID."
              action="decide which participant agent is best suited to respond based on the discussion category and the comment content, then ask that single agent to read the thread and post a single helpful reply via \`gh api graphql\` (mutation \`addDiscussionComment\` with the discussion node ID; pass \`replyToId\` to thread the reply when appropriate). Do not push any commits in response to a discussion."
              ;;
            workflow_dispatch)
              if [ "$DISPATCH_TARGET_TYPE" = "discussion" ]; then
                target_type="discussion"
                target_number="$DISPATCH_TARGET_NUMBER"
                context="Manual dispatch targeting discussion #$target_number (event: $EVENT_NAME)."
                action="decide which participant agent is most appropriate based on the discussion content and category, then ask that agent to assess and post a helpful reply via \`gh api graphql\` (mutation \`addDiscussionComment\`)."
              else
                target_type="pull_request"
                target_number="$DISPATCH_TARGET_NUMBER"
                context="Manual dispatch targeting PR #$target_number (event: $EVENT_NAME)."
                action="decide which participant agent is most appropriate to assess the PR's recent activity and act on it."
              fi
              ;;
            *)
              context="A new comment was posted on PR #$target_number by @$AUTHOR (user type: $AUTHOR_TYPE; event: $EVENT_NAME). Comment URL: $ITEM_URL."
              action="decide which participant agent is most appropriate to handle the comment based on its content and their domain, then ask that single agent to assess the comment and act on it."
              ;;
          esac

          task="$context As facilitator, $action

          Recursion guard (this channel allows bot-authored content so agents can coordinate with each other): before engaging any participant, read the thread history. If the most recent activity is already a response from one of the participant agents you facilitate (product-manager, release-engineer, security-engineer, staff-engineer, technical-writer), stop immediately without engaging anyone — only respond when the latest content introduces a new question, request, or change for them to act on."

          {
            echo "target-type=$target_type"
            echo "target-number=$target_number"
            echo "task<<TASK_EOF"
            echo "$task"
            echo "TASK_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Assess and Act
        uses: ./.github/actions/kata-action
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ steps.ci-app.outputs.token }}
          CLAUDE_CODE_USE_BEDROCK: "0"
          TARGET_TYPE: ${{ steps.task.outputs.target-type }}
          TARGET_NUMBER: ${{ steps.task.outputs.target-number }}
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          mode: "facilitate"
          task-text: ${{ steps.task.outputs.task }}
          facilitator-profile: "product-manager"
          agent-profiles: "release-engineer,security-engineer,staff-engineer,technical-writer"
          model: "claude-opus-4-7[1m]"
          max-turns: "200"
