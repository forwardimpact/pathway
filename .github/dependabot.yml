version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: github-actions
    directories:
      - /
      - /.github/actions/audit
      - /.github/actions/bootstrap
      - /.github/actions/kata-action-agent
      - /.github/actions/kata-action-eval
      - /.github/actions/post-run
    schedule:
      interval: weekly
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # @grpc/proto-loader peer-constrains protobufjs to ^7.x. Block the v8
      # major bump until upstream widens. PR #620 (7.5.5 → 8.0.3) closed.
      - dependency-name: protobufjs
        update-types:
          - version-update:semver-major
      # protobufjs-cli >=2.0.2 requires protobufjs >=8 peer.
      # We pin protobufjs@7.x because @grpc/proto-loader peer-blocks v8.
      - dependency-name: protobufjs-cli
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
      # read-excel-file 8.0.0 renames the default export and changes its
      # return shape (single sheet's rows → array of {name, rows} objects).
      # Template code at
      # products/outpost/templates/.claude/skills/workday-requisition/scripts/parse-workday.mjs
      # uses the v7 default-export API and would silently produce different
      # output under v8. PR #134 (7.0.3 → 8.0.2) closed for this reason.
      # Re-bump only after the template code is adapted to the v8 API.
      - dependency-name: read-excel-file
        update-types:
          - version-update:semver-major
      # @anthropic-ai/claude-agent-sdk >=0.2.113 ships native binaries via
      # platform-specific optional deps. On glibc Linux runners (GitHub
      # ubuntu-latest), the musl variant wins resolution and fails to exec,
      # causing facilitator runs to exit with only a session_start event.
      # See PR #529. Re-bump only after upstream resolves the resolver bug.
      - dependency-name: "@anthropic-ai/claude-agent-sdk"
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
