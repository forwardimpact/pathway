version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: github-actions
    directories:
      - /
      - /.github/actions/*
    schedule:
      interval: weekly
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    ignore:
      # @grpc/proto-loader peer-constrains protobufjs to ^7.x. Block the v8
      # major bump until upstream widens peer compatibility.
      - dependency-name: protobufjs
        update-types:
          - version-update:semver-major
      # protobufjs-cli@2.x requires protobufjs >=8 peer; we pin to the 1.2.x
      # line because @grpc/proto-loader peer-blocks protobufjs v8. CVE-2026-42290
      # and CVE-2026-44295 (pbts/pbjs) are patched in both 1.2.1+ and 2.0.2+.
      - dependency-name: protobufjs-cli
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
          - version-update:semver-patch
      # @anthropic-ai/claude-agent-sdk >=0.2.113 ships native binaries via
      # platform-specific optional deps. On glibc Linux runners (GitHub
      # ubuntu-latest), the musl variant wins resolution and fails to exec,
      # causing facilitator runs to exit with only a session_start event.
      # Re-bump only after upstream resolves the resolver bug.
      - dependency-name: "@anthropic-ai/claude-agent-sdk"
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor
