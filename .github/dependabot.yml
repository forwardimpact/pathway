version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: github-actions
    directories:
      - /
      - /.github/actions/audit
      - /.github/actions/bootstrap
      - /.github/actions/kata-action
      - /.github/actions/post-run
    schedule:
      interval: weekly
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types: [minor, patch]
    # Peer-blocked by @grpc/proto-loader, which pins protobufjs ^7.
    # CONTRIBUTING.md § Dependency Policy forbids nested duplicates.
    # Remove these entries once @grpc/proto-loader supports protobufjs ^8.
    ignore:
      - dependency-name: protobufjs
        versions: [">=8.0.0"]
      - dependency-name: protobufjs-cli
        versions: [">=2.0.2"]
