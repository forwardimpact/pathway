# yaml-language-server: $schema=https://www.forwardimpact.team/schema/json/behaviour.schema.json

name: Collaborate Openly
human:
  description: Collaborate Openly means actively engaging with others by sharing
    ideas, feedback, and information transparently to achieve common goals. It
    fosters trust and encourages inclusive participation within teams and across
    the organization.
  maturityDescriptions:
    emerging: You begin to share your ideas and listen to others, contributing to
      team discussions when prompted. You are open to receiving feedback but may
      hesitate to fully express your thoughts or concerns.
    developing: You consistently share relevant information and ideas proactively,
      encouraging open dialogue. You seek feedback regularly and respond
      constructively, helping to build trust within your immediate team.
    practicing: You actively facilitate open collaboration by encouraging diverse
      perspectives and creating a safe space for honest communication. You share
      insights beyond your team and help resolve misunderstandings promptly.
    role_modeling: You lead by example in transparent collaboration, promoting
      openness across multiple teams or departments. You influence others to
      adopt inclusive communication practices and openly acknowledge
      contributions from all stakeholders.
    exemplifying: You champion a culture of open collaboration organization-wide,
      driving initiatives that break down silos and enhance cross-functional
      teamwork. Your consistent openness inspires others to communicate
      transparently and work collectively towards shared success.
