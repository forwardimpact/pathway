# yaml-language-server: $schema=https://www.forwardimpact.team/schema/json/behaviour.schema.json

name: Own the Outcome
human:
  description: Taking full responsibility for the results of your work means not
    only completing tasks but ensuring the desired impact is achieved. This
    behaviour involves proactive problem-solving, accountability, and a
    commitment to seeing initiatives through to success.
  maturityDescriptions:
    emerging: You begin to recognize your role in the outcomes of your work and take
      responsibility for completing assigned tasks. You understand the
      importance of follow-through but may need guidance to anticipate
      challenges or impacts.
    developing: You consistently take ownership of your work and start to anticipate
      potential issues. You actively seek feedback and adjust your approach to
      improve results, showing growing accountability for outcomes beyond your
      immediate tasks.
    practicing: You reliably own the end-to-end process of your work, proactively
      managing risks and collaborating to overcome obstacles. You hold yourself
      accountable for results and influence others to take responsibility as
      well.
    role_modeling: You demonstrate strong ownership by driving initiatives to
      successful completion, even in complex or ambiguous situations. You mentor
      others to develop this mindset and embed accountability within your team
      or area.
    exemplifying: You embody ownership at an organizational level, inspiring a
      culture where everyone takes responsibility for outcomes. You lead by
      example, championing continuous improvement and ensuring sustained impact
      across multiple teams or projects.
