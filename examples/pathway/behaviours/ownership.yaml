# yaml-language-server: $schema=https://www.forwardimpact.team/schema/json/behaviour.schema.json

name: Own the Outcome
human:
  description: Taking full responsibility for the results of your work means not
    only completing tasks but ensuring they meet the intended goals and quality
    standards. This behaviour reflects a proactive mindset where you anticipate
    challenges and drive solutions to successful completion.
  maturityDescriptions:
    emerging: You begin to recognize your role in delivering results and take
      responsibility for your assigned tasks. You follow through on commitments
      but may need guidance to handle unexpected issues or to see the broader
      impact of your work.
    developing: You consistently take ownership of your work outcomes, proactively
      identifying potential obstacles and seeking support when needed. You start
      to understand how your contributions affect team goals and take steps to
      align your efforts accordingly.
    practicing: You reliably own the end-to-end delivery of your work, anticipating
      risks and implementing solutions independently. You hold yourself
      accountable for quality and deadlines, and you actively communicate
      progress and challenges to stakeholders.
    role_modeling: You demonstrate strong ownership by leading initiatives and
      inspiring others to take responsibility for their outcomes. You foster a
      culture of accountability within your team and influence cross-functional
      collaboration to ensure collective success.
    exemplifying: You embody ownership at an organizational level, driving strategic
      outcomes and championing accountability across teams. Your consistent
      delivery and leadership set a benchmark, and you mentor others to develop
      this mindset, ensuring sustained impact and continuous improvement.
