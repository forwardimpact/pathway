# yaml-language-server: $schema=https://www.forwardimpact.team/schema/json/capability.schema.json

id: reliability
name: Reliability
emojiIcon: 🛡️
ordinalRank: 2
description: Reliability focuses on ensuring systems are robust, available, and
  maintainable through effective monitoring, incident response, and thoughtful
  system design.
professionalResponsibilities:
  awareness: You understand the importance of system reliability and basic
    concepts of monitoring and incident response.
  foundational: You contribute to monitoring efforts and assist in incident
    response under guidance, while learning reliable system design principles.
  working: You independently handle incident response tasks, maintain monitoring
    systems, and apply reliable design patterns in your work.
  practitioner: You lead incident response efforts, optimize monitoring
    strategies, and design systems with high reliability and fault tolerance.
  expert: You define organizational reliability standards, mentor others, and
    innovate in system design to maximize uptime and resilience.
managementResponsibilities:
  awareness: You recognize the value of reliability practices and support team
    adherence to basic standards.
  foundational: You ensure teams have resources for monitoring and incident
    response and encourage adoption of reliable design.
  working: You manage incident response processes, oversee monitoring
    effectiveness, and guide system design decisions for reliability.
  practitioner: You lead cross-team reliability initiatives, establish best
    practices, and manage risk related to system availability.
  expert: You set strategic reliability goals, influence organizational culture
    towards resilience, and drive innovation in reliability engineering.
skills:
  - id: incident_response
    name: Incident Response
    human:
      description: Incident response involves detecting, managing, and resolving
        system outages or degradations to minimize impact and restore service
        quickly.
      proficiencyDescriptions:
        awareness: You recognize common types of incidents and understand basic response
          procedures.
        foundational: You assist in incident detection and follow established protocols
          to support resolution efforts.
        working: You independently manage incident response tasks, coordinate with
          stakeholders, and contribute to post-incident reviews.
        practitioner: You lead incident response teams, develop response playbooks, and
          drive continuous improvement in incident handling.
        expert: You design and implement comprehensive incident management frameworks
          and mentor others in advanced response strategies.
  - id: monitoring
    name: Monitoring
    human:
      description: Monitoring is the continuous observation of system health and
        performance to detect anomalies and ensure operational stability.
      proficiencyDescriptions:
        awareness: You understand the purpose of monitoring and basic metrics commonly
          tracked.
        foundational: You configure and maintain monitoring tools to track system health
          under supervision.
        working: You analyze monitoring data to identify issues and tune alerts to
          reduce noise and improve detection.
        practitioner: You design monitoring architectures, define key performance
          indicators, and integrate monitoring into development workflows.
        expert: You innovate monitoring strategies, lead organization-wide observability
          initiatives, and mentor others in advanced monitoring techniques.
  - id: system_design
    name: System Design
    human:
      description: System design involves architecting software and infrastructure to
        meet reliability, scalability, and maintainability requirements.
      proficiencyDescriptions:
        awareness: You are familiar with basic system design concepts and common
          architectural patterns.
        foundational: You contribute to design discussions and apply simple design
          principles under guidance.
        working: You independently design components and systems that meet reliability
          and performance goals.
        practitioner: You lead design efforts for complex systems, balancing trade-offs
          and ensuring fault tolerance.
        expert: You define system design standards, influence architecture decisions at
          scale, and mentor others in best practices.
