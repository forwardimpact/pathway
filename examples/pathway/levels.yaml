# yaml-language-server: $schema=https://www.forwardimpact.team/schema/json/levels.schema.json

- id: L1
  professionalTitle: Engineer I
  managementTitle: Engineering Manager I
  typicalExperienceRange: 0-2 years
  ordinalRank: 1
  qualificationSummary: An Engineer I typically has {typicalExperienceRange} of
    experience and demonstrates foundational engineering skills. They are
    beginning to contribute to projects under supervision and are developing
    their technical and collaborative abilities.
  baseSkillProficiencies:
    primary: foundational
    secondary: awareness
    broad: awareness
  baseBehaviourMaturity: emerging
  expectations:
    impactScope: Contributes to individual tasks and small components of projects.
    autonomyExpectation: Works under close supervision with guidance.
    influenceScope: Limited to immediate team and peers.
    complexityHandled: Handles well-defined, low-complexity tasks.
- id: L2
  professionalTitle: Engineer II
  managementTitle: Engineering Manager II
  typicalExperienceRange: 2-4 years
  ordinalRank: 2
  qualificationSummary: An Engineer II generally has {typicalExperienceRange} of
    experience and demonstrates working proficiency in core engineering skills.
    They contribute independently to projects and begin to support junior
    engineers.
  baseSkillProficiencies:
    primary: working
    secondary: foundational
    broad: foundational
  baseBehaviourMaturity: developing
  expectations:
    impactScope: Delivers features and components that contribute to team goals.
    autonomyExpectation: Works with moderate supervision and some guidance.
    influenceScope: Influences immediate team and occasionally cross-team efforts.
    complexityHandled: Manages moderately complex tasks with some ambiguity.
- id: L3
  professionalTitle: Senior Engineer
  managementTitle: Senior Engineering Manager
  typicalExperienceRange: 4-7 years
  ordinalRank: 3
  qualificationSummary: A Senior Engineer has {typicalExperienceRange} of
    experience and demonstrates practitioner-level expertise in their primary
    skills. They lead technical efforts, mentor others, and contribute to
    architectural decisions.
  baseSkillProficiencies:
    primary: practitioner
    secondary: working
    broad: working
  baseBehaviourMaturity: practicing
  expectations:
    impactScope: Leads significant technical projects impacting multiple teams.
    autonomyExpectation: Operates with high autonomy and minimal supervision.
    influenceScope: Influences cross-team initiatives and technical direction.
    complexityHandled: Handles complex problems with multiple dependencies.
