# yaml-language-server: $schema=https://www.forwardimpact.team/schema/json/drivers.schema.json

- id: clear_direction
  name: Clear Direction
  description: Teams with clear direction understand the goals and priorities that
    drive their work. This clarity enables focused problem solving and effective
    decision-making to achieve business objectives efficiently.
  contributingSkills:
    - problem_solving
  contributingBehaviours:
    - ownership
- id: deep_work
  name: Deep Work
  description: Deep work emphasizes sustained focus on complex tasks to deliver
    high-quality, well-designed solutions. It fosters collaboration and
    ownership, ensuring that teams produce reliable and maintainable systems.
  contributingSkills:
    - code_quality
    - system_design
  contributingBehaviours:
    - ownership
    - collaboration
