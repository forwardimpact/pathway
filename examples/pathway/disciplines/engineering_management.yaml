# yaml-language-server: $schema=https://www.forwardimpact.team/schema/json/discipline.schema.json

specialization: Engineering Management
roleTitle: Engineering Manager
isProfessional: false
isManagement: true
validTracks:
  - null
description: Engineering Management focuses on leading engineering teams to
  deliver high-quality solutions efficiently. This discipline emphasizes problem
  solving and incident response while maintaining code quality and testing
  practices.
coreSkills:
  - problem_solving
  - incident_response
supportingSkills:
  - code_quality
broadSkills:
  - testing_practices
behaviourModifiers:
  ownership: 1
  collaboration: 1
human:
  roleSummary: "{roleTitle} leads and supports engineering teams by driving
    problem solving and managing incident response. This role ensures high
    standards in code quality and testing practices within the {specialization}
    discipline."
