# yaml-language-server: $schema=https://www.forwardimpact.team/schema/json/discipline.schema.json

specialization: Software Engineering
roleTitle: Software Engineer
isProfessional: true
isManagement: false
validTracks:
  - null
  - platform
minLevel: entry
description: Software Engineering focuses on designing, developing, and
  maintaining software systems with an emphasis on quality and scalability.
  Professionals in this discipline apply problem-solving skills and system
  design principles to deliver robust software solutions.
coreSkills:
  - problem_solving
  - code_quality
  - system_design
supportingSkills:
  - testing_practices
  - monitoring
broadSkills:
  - incident_response
behaviourModifiers:
  ownership: 1
  collaboration: 1
human:
  roleSummary: "{roleTitle}s in {specialization} are responsible for creating
    high-quality software solutions by applying strong problem-solving and
    system design skills. They ensure code quality and reliability while
    collaborating effectively with cross-functional teams."
