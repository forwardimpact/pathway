# yaml-language-server: $schema=https://www.forwardimpact.team/schema/json/stages.schema.json

- id: specify
  name: Specify
  emojiIcon: 📝
  description: You gather and define the requirements and objectives for the
    engineering task. You clarify the scope and constraints to ensure a clear
    understanding. You document the specifications to guide subsequent stages.
  summary: This stage involves gathering and defining clear requirements and
    objectives for the engineering task.
  handoffs:
    - targetStage: plan
      label: Proceed to Plan
      prompt: Use the specifications to create a detailed plan for implementation.
  constraints:
    - Do not start implementation before specifications are complete.
    - Avoid ambiguous or incomplete requirements.
    - Do not change scope without proper authorization.
  readChecklist:
    - Review all stakeholder requirements.
    - Clarify any ambiguous points with stakeholders.
    - Document the complete specification clearly.
  confirmChecklist:
    - Ensure all requirements are documented.
    - Verify scope and constraints are agreed upon.
    - Confirm specifications are approved by stakeholders.
- id: plan
  name: Plan
  emojiIcon: 📅
  description: You create a detailed plan to achieve the specified requirements.
    You break down tasks, estimate timelines, and allocate resources. You
    prepare for smooth execution in the coding stage.
  summary: This stage focuses on creating a detailed plan including task
    breakdown, timelines, and resource allocation.
  handoffs:
    - targetStage: code
      label: Start Coding
      prompt: Follow the plan to begin coding the solution.
  constraints:
    - Do not begin coding before the plan is finalized.
    - Avoid overcommitting resources or unrealistic timelines.
    - Do not skip risk assessment and mitigation planning.
  readChecklist:
    - Review specifications thoroughly.
    - Break down tasks and assign responsibilities.
    - Estimate timelines and resources needed.
  confirmChecklist:
    - Confirm plan aligns with specifications.
    - Verify resource availability.
    - Ensure risk mitigation strategies are documented.
- id: code
  name: Code
  emojiIcon: 💻
  description: You write and implement the code according to the plan and
    specifications. You follow coding standards and best practices. You prepare
    your work for review by peers.
  summary: This stage involves writing and implementing code following the plan
    and standards.
  handoffs:
    - targetStage: review
      label: Submit for Review
      prompt: Provide your code for peer review and feedback.
  constraints:
    - Do not bypass coding standards or best practices.
    - Avoid committing incomplete or untested code.
    - Do not proceed without adequate documentation.
  readChecklist:
    - Review the plan and specifications before coding.
    - Follow coding standards and guidelines.
    - Write unit tests and document code.
  confirmChecklist:
    - Ensure code meets specifications.
    - Verify all tests pass successfully.
    - Confirm code is documented and ready for review.
- id: review
  name: Review
  emojiIcon: 🔍
  description: You examine the code for quality, correctness, and adherence to
    standards. You provide constructive feedback and request changes if
    necessary. You approve the code when it meets all criteria.
  summary: This stage focuses on code quality assurance through peer review and
    feedback.
  handoffs:
    - targetStage: deploy
      label: Approve and Deploy
      prompt: Approve the code and prepare it for deployment.
    - targetStage: code
      label: Request Changes
      prompt: Send the code back for revisions based on review feedback.
  constraints:
    - Do not approve code with unresolved issues.
    - Avoid superficial reviews; be thorough and objective.
    - Do not delay feedback unnecessarily.
  readChecklist:
    - Understand the code changes and context.
    - Check adherence to coding standards.
    - Run or verify tests and functionality.
  confirmChecklist:
    - Confirm all issues are addressed.
    - Ensure code meets quality standards.
    - Approve only when confident in code readiness.
- id: deploy
  name: Deploy
  emojiIcon: 🚀
  description: You release the approved code to the production environment. You
    monitor deployment for issues and ensure stability. You communicate
    deployment status to stakeholders.
  summary: This stage involves releasing code to production and monitoring its
    performance.
  handoffs:
    - targetStage: specify
      label: Start New Cycle
      prompt: Begin gathering requirements for the next engineering task.
  constraints:
    - Do not deploy unapproved or untested code.
    - Avoid deploying during high-risk periods without contingency plans.
    - Do not ignore monitoring and incident response.
  readChecklist:
    - Review deployment plan and rollback procedures.
    - Notify stakeholders of deployment schedule.
    - Prepare monitoring tools and alerts.
  confirmChecklist:
    - Verify successful deployment.
    - Confirm system stability and performance.
    - Communicate completion and any issues.
