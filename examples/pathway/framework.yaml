# yaml-language-server: $schema=https://www.forwardimpact.team/schema/json/framework.schema.json

title: Example Engineering Career Framework
emojiIcon: 🛠️
tag: "#ExampleEng"
description: This framework provides a structured pathway for engineering career
  development at Example.dev. It defines key roles, skills, and behaviors to
  guide growth and progression within the engineering discipline.
distribution:
  siteUrl: https://example.dev/pathway
entityDefinitions:
  driver:
    title: Driver
    emojiIcon: 🚗
    description: A motivating factor or goal that propels engineering work forward.
  skill:
    title: Skill
    emojiIcon: 🧰
    description: A specific technical or interpersonal ability required for
      engineering success.
  behaviour:
    title: Behaviour
    emojiIcon: 🤝
    description: Observable actions and attitudes that influence team dynamics and outcomes.
  discipline:
    title: Discipline
    emojiIcon: 📚
    description: A specialized area of engineering expertise or practice.
  level:
    title: Level
    emojiIcon: 📈
    description: A stage of seniority or proficiency within the engineering career path.
  track:
    title: Track
    emojiIcon: 🛤️
    description: A defined career progression route focusing on a particular
      engineering role or function.
  job:
    title: Job
    emojiIcon: 💼
    description: A specific position or role held by an engineer within the organization.
  agent:
    title: Agent
    emojiIcon: 🤖
    description: An individual or entity responsible for driving or influencing
      engineering outcomes.
  stage:
    title: Stage
    emojiIcon: 🎯
    description: A phase within a process or career progression marking key milestones.
  tool:
    title: Tool
    emojiIcon: 🔧
    description: A software, hardware, or methodology used to facilitate engineering tasks.
